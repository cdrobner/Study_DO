let _dataSubmitted = false;
// Build per-check flat columns from STATE.comprehensionDetail.
// Returns an object with keys: <prefix>_attempts_total, <prefix>_failed_attempts,
// <prefix>_first_try_all_correct, <prefix>_item_<qid>_first_correct for each qid.
function extractCheckFlatFields(checkId, prefix, qids) {
  const attempts = (STATE.comprehensionDetail || []).filter(d => d.checkId === checkId);
  const out = {};
  if (attempts.length === 0) {
    out[`${prefix}_attempts_total`] = null;
    out[`${prefix}_failed_attempts`] = null;
    out[`${prefix}_first_try_all_correct`] = null;
    qids.forEach(qid => { out[`${prefix}_item_${qid}_first_correct`] = null; });
    return out;
  }
  const totalAttempts = attempts.length;
  const failedAttempts = attempts.filter(a => !a.passed).length;
  const firstAttempt = attempts[0];
  out[`${prefix}_attempts_total`] = totalAttempts;
  out[`${prefix}_failed_attempts`] = failedAttempts;
  out[`${prefix}_first_try_all_correct`] = firstAttempt.passed ? 1 : 0;
  qids.forEach(qid => {
    const resp = (firstAttempt.responses || []).find(r => r.qid === qid);
    out[`${prefix}_item_${qid}_first_correct`] = resp ? (resp.isError ? 0 : 1) : null;
  });
  return out;
}

async function submitData() {
  if (_dataSubmitted) return;
  _dataSubmitted = true;

  // ---- Per-round flat fields ----
  // STATE.rounds is 0-indexed; rounds[i] corresponds to round i+1.
  const rounds = STATE.rounds || [];
  const r = (i) => rounds[i] || {};  // safe accessor
  const getTheta = (i) => r(i).beliefTheta != null ? r(i).beliefTheta : null;
  const getGamma = (i) => r(i).beliefGamma != null ? r(i).beliefGamma : null;
  const getMgr   = (i) => r(i).manager || null;
  const getGreens = (i) => r(i).hCount != null ? r(i).hCount : null;

  // ---- Derived per-round / per-decision measures (cover all CONFIG.blocks rounds) ----
  const T = CONFIG.blocks.length;
  const initialGamma = STATE.initialMu;       // 0-100
  const gammaStar    = STATE.gammaStar;       // 0-100
  const deltaGamma0  = (initialGamma != null && gammaStar != null) ? (initialGamma - gammaStar) : null;
  const absDelta0    = deltaGamma0 != null ? Math.abs(deltaGamma0) : null;
  const oc           = deltaGamma0 != null ? (deltaGamma0 > 0 ? 1 : 0) : null;

  // Per-round decision metadata is built below (in the perRoundFields loop) from
  // rounds[i].choiceInfo â€” the TRUE stay/switch decision and its 75%-implementation
  // outcome â€” never re-derived from the realized-manager path.
  const perfName = STATE.perfManagerIsAlex ? 'alex' : 'sam';
  const bin01 = (x) => (x == null ? null : (x ? 1 : 0));

  // bias_reduction_t / norm_correction_t: one per round (t = 1..T)
  const biasReduction = [], normCorrection = [];
  for (let i = 0; i < T; i++) {
    const g_t = getGamma(i);
    if (g_t != null && gammaStar != null && absDelta0 != null) {
      const absBias_t = Math.abs(g_t - gammaStar);
      biasReduction[i]  = absDelta0 - absBias_t;
      normCorrection[i] = absDelta0 > 0 ? biasReduction[i] / absDelta0 : null;
    } else { biasReduction[i] = null; normCorrection[i] = null; }
  }

  // Flatten per-round / per-decision fields dynamically so every round (1..T) and
  // decision (1..T-1) gets a column. performance_belief_0 = initial خ¼.
  const perRoundFields = { performance_belief_0: initialGamma };
  for (let i = 0; i < T; i++) {
    const t = i + 1;
    perRoundFields['performance_belief_' + t] = getGamma(i);
    perRoundFields['managertype_belief_' + t] = getTheta(i);
    perRoundFields['manager_' + t]            = getMgr(i);
    perRoundFields['green_count_' + t]        = getGreens(i);
    perRoundFields['bias_reduction_' + t]     = biasReduction[i];
    perRoundFields['norm_correction_' + t]    = normCorrection[i];
  }
  // Decision columns, indexed by the round they lead INTO (t = 1..T). Round 1 is
  // the free round (no decision) â†’ all null. rounds[i].choiceInfo carries the true
  // decision that entered round i+1.
  for (let i = 0; i < T; i++) {
    const t  = i + 1;
    const ci = r(i).choiceInfo || null;                       // decision entering round t
    const prevMgr   = i > 0 ? getMgr(i - 1)        : null;
    const prevTheta = i > 0 ? r(i - 1).beliefTheta : null;    // خ¸(prev manager = Performance)
    // خ¸ that the CHOSEN manager is Performance, evaluated at the decision (from the
    // previous round's خ¸ about its then-current manager; pegged if they switched).
    let beliefChosenPerf = null;
    if (ci && ci.chosenManager && prevTheta != null) {
      beliefChosenPerf = (ci.chosenManager === prevMgr) ? prevTheta : (100 - prevTheta);
    }
    perRoundFields['chosen_manager_' + t]             = ci ? (ci.chosenManager   || null) : null;
    perRoundFields['switched_' + t]                   = ci ? bin01(ci.switched)      : null;
    perRoundFields['implement_branch_' + t]           = ci ? (ci.implementBranch || null) : null;
    perRoundFields['implemented_' + t]                = ci ? (ci.implementBranch === 'implemented' ? 1 : 0) : null;
    perRoundFields['branch_source_' + t]              = ci ? (ci.branchSource || null) : null;   // 'server' (stratified) / 'fallback'
    perRoundFields['choice_honored_' + t]             = ci ? bin01(ci.choiceHonored) : null;
    perRoundFields['chosen_is_perf_manager_' + t]     = (ci && ci.chosenManager) ? (ci.chosenManager === perfName ? 1 : 0) : null;
    perRoundFields['realized_is_perf_manager_' + t]   = getMgr(i) ? (getMgr(i) === perfName ? 1 : 0) : null;
    perRoundFields['belief_chosen_is_perf_' + t]      = beliefChosenPerf;              // خ¸(chosen mgr = Performance) at decision
    // NB: the realized/implemented manager is manager_t, and the belief that it is
    // the Performance manager is managertype_belief_t â€” no aliases duplicated here.
  }

  // ---- Honeypot helper ----
  const honeypotEl = document.getElementById('hp_referral_code_a4b9');
  const honeypotValue = honeypotEl ? honeypotEl.value : null;
  const honeypotTripped = !!(honeypotEl && honeypotEl.value && honeypotEl.value.length > 0);

  // ---- Construct the flat payload ----
  const data = {
    // ===== Identifiers =====
    prolific_pid: STATE.prolificPid,
    study_id: STATE.studyId,
    session_id: STATE.sessionId,
    timestamp: new Date().toISOString(),

    // ===== Condition + design metadata =====
    condition: STATE.quizCondition,                                   // "easy" / "hard"
    easy: STATE.quizCondition === 'easy' ? 1 : 0,                     // 0/1 for regression
    condition_draw: STATE.quizConditionDraw,
    stratum: STATE.stratificationStratum,
    shared_score: STATE.sharedScoreAtStratification,
    stratification_server_attempts: STATE.stratificationServerAttempts,
    stratification_failures_json: STATE.stratificationFailures ? JSON.stringify(STATE.stratificationFailures) : null,
    perf_manager_is_alex: STATE.perfManagerIsAlex ? 1 : 0,
    first_round_manager: STATE.firstRoundManager,
    alex_color: STATE.alexColor,
    sam_color: STATE.samColor,
    name_order: STATE.nameOrder ? STATE.nameOrder.join(',') : null,
    mgr_belief_left: STATE.mgrBeliefLeft ? 1 : 0,

    // ===== Sample question (pre-quiz practice; pre-treatment screen) =====
    sample_question_selected: STATE.sampleQuestionSelected,
    sample_question_correct: STATE.sampleQuestionCorrect === null ? null : (STATE.sampleQuestionCorrect ? 1 : 0),

    // ===== Quiz =====
    quiz_score_total: STATE.quizScore,
    quiz_score_shared: STATE.quizScoreShared,
    gamma_star: gammaStar,                          // 0-100
    random_prob_shown: STATE.randomProbShown,       // 0-100

    // ===== Beliefs + per-round structure (all 0-100) =====
    // Dynamically generated for every round t=1..T (performance_belief_t [t=0=initial خ¼],
    // managertype_belief_t, manager_t, green_count_t, bias_reduction_t, norm_correction_t)
    // and the decision that entered each round (null for the free round 1):
    // chosen_manager_t, switched_t, implement_branch_t, implemented_t, choice_honored_t,
    // chosen_is_perf_manager_t, realized_is_perf_manager_t, belief_chosen_is_perf_t.
    // (realized/implemented manager = manager_t; خ¸ about it = managertype_belief_t.)
    ...perRoundFields,
    initial_confidence: STATE.initialConfidence,
    initial_kappa: STATE.initialKappa,
    initial_alpha: STATE.initialAlpha,
    initial_beta: STATE.initialBeta,

    // ===== Derived bias measures (scalars) =====
    delta_gamma_0: deltaGamma0,
    abs_delta_gamma_0: absDelta0,
    oc: oc,

    // ===== Comprehension checks (flat per-check summaries) =====
    clarity_feedback: STATE.clarityFeedback,
    clarity_comprehension: STATE.clarityComprehension ? STATE.clarityComprehension.join(',') : null,
    clarity_comprehension_correct: STATE.clarityComprehensionCorrect ? 1 : 0,
    // Quiz-instructions comprehension (post-quizInstructions): 2 items
    ...extractCheckFlatFields('comprehensionCheck0', 'quiz_check',
        ['quiz_pay', 'quiz_no_effect_false']),
    // Clarity check (post-primer, Round 1): 4 items
    ...extractCheckFlatFields('clarityCheck', 'clarity_check',
        ['mech', 'revise', 'accuracy_pays', 'bonuses_pay']),
    // Sum of incorrect answers on the FIRST attempt across the remaining gated
    // comprehension checks: quiz-instructions (comprehensionCheck0), the round-1
    // clarity check (clarityCheck), the four mTypes inline questions (green-rate
    // أ—2 + informativeness true/false أ—2), and the ambiguity urn check. The
    // deleted mTaskCheck/mTypesCheck contribute nothing.
    ...(function () {
      const detail = STATE.comprehensionDetail || [];
      const firstErr = (id) => {
        const f = detail.filter(d => d.checkId === id).sort((a, b) => a.attempt - b.attempt)[0];
        return f ? f.responses.filter(r => r.isError).length : 0;
      };
      const quiz = firstErr('comprehensionCheck0');
      const clarity = firstErr('clarityCheck');
      const mtypes = Object.values(STATE.mtypesChecks || {}).filter(q => q.firstTryCorrect === false).length;
      const ambiguity = (STATE.ambiguityAnswers && STATE.ambiguityAnswers.checkCorrectFirstTry === false) ? 1 : 0;
      return {
        comprehension_incorrect_quiz: quiz,
        comprehension_incorrect_clarity: clarity,
        comprehension_incorrect_mtypes: mtypes,
        comprehension_incorrect_ambiguity: ambiguity,
        comprehension_incorrect_sum: quiz + clarity + mtypes + ambiguity,
      };
    })(),

    // ===== Post-experiment measures =====
    risk_preference: STATE.riskPreference,
    patience_preference: STATE.patiencePreference,
    age: STATE.demographicAge,
    gender: STATE.demographicGender,

    // ===== Pre-quiz screening (attention checks + covariates, pre-treatment) =====
    screening_moon: STATE.screeningMoon,
    screening_duration: STATE.screeningDuration,
    prolific_frequency: STATE.prolificFrequency,
    attn_check1_pass: STATE.attnCheck1Pass === null ? null : (STATE.attnCheck1Pass ? 1 : 0),
    attn_check2_pass: STATE.attnCheck2Pass === null ? null : (STATE.attnCheck2Pass ? 1 : 0),

    ambiguity_color: STATE.ambiguityAnswers ? STATE.ambiguityAnswers.color : null,
    ambiguity_urn_preference: STATE.ambiguityAnswers ? STATE.ambiguityAnswers.urnPreference : null,
    ambiguity_check_choice: STATE.ambiguityAnswers ? STATE.ambiguityAnswers.checkChoice : null,
    ambiguity_check_correct_first_try: STATE.ambiguityAnswers ? (STATE.ambiguityAnswers.checkCorrectFirstTry ? 1 : 0) : null,

    // ===== Reveal option =====
    opted_in_reveal: STATE.optedInReveal == null ? null : (STATE.optedInReveal ? 1 : 0),
    reveal_button_order: STATE.revealButtonOrder,

    // ===== Payment =====
    selected_payment_round: STATE.selectedPaymentRound,
    bonus_pay: STATE.outcomeEarnings,
    selected_belief_is_initial: STATE.selectedBeliefIsInitial == null ? null : (STATE.selectedBeliefIsInitial ? 1 : 0),
    selected_belief_round: STATE.selectedBeliefRound,
    selected_belief_type: STATE.selectedBeliefType,
    belief_bonus_amount: STATE.beliefBonus_amount,
    belief_bonus_won: STATE.beliefBonus_won == null ? null : (STATE.beliefBonus_won ? 1 : 0),
    belief_bonus_event: STATE.beliefBonus_event,
    belief_bonus_win_prob: STATE.beliefBonus_winProb,
    belief_bonus_draw: STATE.beliefBonus_draw,
    belief_bonus_opp_score: STATE.beliefBonus_oppScore,

    // ===== Visual check (AI honeypot) =====
    visual_check_total_correct: STATE.visualCheck ? STATE.visualCheck.totalCorrect : null,

    // ===== AI defense scalars =====
    honeypot_tripped: honeypotTripped ? 1 : 0,
    honeypot_value: honeypotValue,
    n_paste_events: Array.isArray(STATE.pasteEvents) ? STATE.pasteEvents.length : 0,
    n_focus_events: Array.isArray(STATE.focusEvents) ? STATE.focusEvents.length : 0,
    n_copy_attempts: STATE.copyAttempts || 0,

    // ===== Timing =====
    total_duration_ms: Date.now() - STATE.startTime,

    // ===== Raw JSON columns for forensic / detailed analysis =====
    rounds_raw_json: JSON.stringify(rounds.map(rd => ({
      roundNum: rd.roundNum, blockNum: rd.blockNum, signals: rd.signals,
      choiceBefore: rd.choiceBefore, choiceInfo: rd.choiceInfo, manager: rd.manager,
      transferred: rd.transferred, outcomes: rd.outcomes, opponentScores: rd.opponentScores,
      hCount: rd.hCount, earnings: rd.earnings,
      beliefTheta: rd.beliefTheta, beliefGamma: rd.beliefGamma,
      priorTheta: rd.priorTheta, priorGamma: rd.priorGamma,
      thetaChanged: rd.thetaChanged, gammaChanged: rd.gammaChanged,
      tsRoundStart: rd.tsRoundStart, tsFeedbackShown: rd.tsFeedbackShown,
      tsBeliefsShown: rd.tsBeliefsShown, tsBeliefsSubmit: rd.tsBeliefsSubmit,
      tsChoiceMade: rd.tsChoiceMade,
    }))),
    quiz_answers_json: JSON.stringify(STATE.quizAnswers || []),
    screen_timestamps_json: JSON.stringify(STATE.screenTimestamps || []),
    screen_durations_json: JSON.stringify(STATE.screenDurations || {}),
    paste_events_json: JSON.stringify(STATE.pasteEvents || []),

    // Confidence + CU battery (elicited after the first practice scenario). CU =

  // Store as backup
  window._experimentData = data;

  // Send to Google Sheets with retry
  if (CONFIG.googleSheetsURL) {
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        await fetch(CONFIG.googleSheetsURL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        break; // success
      } catch (e) {
        console.error(`Submit attempt ${attempt} failed:`, e);
        if (attempt < 3) await new Promise(r => setTimeout(r, 1000 * attempt));
      }
    }
  } else {
    console.log('DATA (no endpoint configured):', JSON.stringify(data, null, 2));
  }
}


/* ==============================================================
   INITIALIZATION
   ============================================================== */

// ---- Mobile detection ----
// Catches:
//   (1) Standard mobile UA strings (iPhone, old iPads, Android phones, etc.)
//   (2) iPad on iPadOS 13+ â€” reports a "Macintosh" UA indistinguishable from
//       a desktop Mac. Distinguish via navigator.maxTouchPoints: real Macs
//       report 0; iPads typically report 5+.
//   (3) Narrow viewports as a fallback (will also catch small split-screen
//       desktop windows â€” over-inclusive but on the safe side).
function isMobileDevice() {
  const ua = navigator.userAgent || '';
  if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) return true;
  if (/Macintosh/.test(ua) && navigator.maxTouchPoints && navigator.maxTouchPoints > 1) return true;
  if (window.innerWidth < 768) return true;
  return false;
}

function showMobileBlocked() {
  container.innerHTML = `
    <h2 class="m-h1">Desktop Required</h2>
    <p>This study can only be completed on a <strong>desktop or laptop computer</strong>. Mobile devices, tablets, and small screens are not supported.</p>
    <p>Please reopen this link on a desktop or laptop computer to participate.</p>
    <p>If you believe this is an error, please contact the researchers.</p>`;

  // Log rejection to Google Sheets
  if (CONFIG.googleSheetsURL) {
    fetch(CONFIG.googleSheetsURL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prolific_pid: new URLSearchParams(window.location.search).get('PROLIFIC_PID') || 'unknown',
        mobile_blocked: 1,
        timestamp: new Date().toISOString(),
      }),
    }).catch(() => {});
  }
}

// ---- Block copy/cut/right-click + log paste + log focus changes ----
(function() {
  document.addEventListener('copy', (e) => { e.preventDefault(); STATE.copyAttempts++; });
  document.addEventListener('cut', (e) => { e.preventDefault(); STATE.copyAttempts++; });
  document.addEventListener('contextmenu', (e) => { e.preventDefault(); });

  // Paste: log everywhere, block only in <textarea> elements. (Other inputs
  // like the age number field still accept paste â€” participants may
  // legitimately paste digits there.)
  document.addEventListener('paste', (e) => {
    const t = e.target;
    const tag = (t && t.tagName) ? t.tagName.toUpperCase() : '';
    const id  = (t && t.id) ? t.id : '';
    const isTextarea = (tag === 'TEXTAREA');
    let length = 0;
    try {
      const data = e.clipboardData && e.clipboardData.getData('text');
      length = data ? data.length : 0;
    } catch (_) { /* clipboard API may be restricted */ }
    if (isTextarea) e.preventDefault();
    STATE.pasteEvents.push({
      ts: Date.now(),
      screen: window._currentScreen || null,
      tag, id, isTextarea, length,
      blocked: isTextarea,
    });
  });

  // Focus / visibility: log alt-tab, minimize, page hide, and refocus events.
  // Especially relevant during the timed quiz â€” a participant tabbing out to
  // ChatGPT mid-question leaves a trace here.
  function logFocus(eventName) {
    STATE.focusEvents.push({
      ts: Date.now(),
      screen: window._currentScreen || null,
      event: eventName,
    });
  }
  document.addEventListener('visibilitychange', () => {
    logFocus(document.hidden ? 'hidden' : 'visible');
  });
  window.addEventListener('blur',  () => logFocus('blur'));
  window.addEventListener('focus', () => logFocus('focus'));
})();

/* ==============================================================
   DEV MODE â€” screen jumper for development/iteration
   Usage:
     ?dev=1                          â†’ dev menu (list of jumpable targets)
     ?dev=1&jump=<id>                â†’ jump directly to a screen or block
     Optional params (state setup):
       ?score=N        quiz score (default 8)
       ?shared=N       shared-question score (default 4) â€” determines خ³*
       ?easy=1|hard=1  quiz condition (default easy)
       ?start=alex|sam starting manager (default alex)
       ?perf=alex|sam  which manager is the Performance Manager (default alex)
   Disabled automatically on remote hosts so it can't be triggered by participants.
   ============================================================== */

function isDevAllowed() {
  const h = window.location.hostname;
  return h === '' || h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local');
}

function setupDevBaseState(params) {
  // Seed Math.random so every dev-mode navigation produces the same random
  // sequence. This makes the block-state screenshots (primer / bonuses / خ³ / خ¸ج‚)
  // share a coherent set of payments + comparison numbers.
  (function() {
    let t = parseInt(params.seed || '12345');
    Math.random = function() {
      t |= 0; t = t + 0x6D2B79F5 | 0;
      let r = Math.imul(t ^ t >>> 15, 1 | t);
      r = r + Math.imul(r ^ r >>> 7, 61 | r) ^ r;
      return ((r ^ r >>> 14) >>> 0) / 4294967296;
    };
  })();

  STATE.alexColor = '#6d28d9';
  STATE.samColor  = '#0e7490';
  document.documentElement.style.setProperty('--eval-color-alex', STATE.alexColor);
  document.documentElement.style.setProperty('--eval-color-sam', STATE.samColor);
  STATE.nameOrder   = ['alex', 'sam'];
  STATE.mgrBeliefLeft = (params.panel === 'right') ? false : true; // ?panel=right forces manager-type on right
  STATE.prolificPid = 'DEV_USER';
  STATE.sessionId   = 'dev_' + Date.now();
  STATE.studyId     = 'dev';

  STATE.quizCondition   = (params.hard === '1') ? 'hard' : 'easy';
  STATE.quizScoreShared = parseInt(params.shared || '4');
  STATE.quizScore       = parseInt(params.score  || '8');
  STATE.gammaStar       = computeGammaStar(STATE.quizScoreShared);
  STATE.randomProbShown = Math.round(STATE.gammaStar);

  // Default prior belief so screens past the elicitation have something to read.
  // Dev default is 65 (not 50) so it stays distinct from the 50/50 manager-type
  // prior; override per test with ?mu=N.
  const _muParam = parseInt(params.mu);
  STATE.initialMu         = Number.isFinite(_muParam) ? _muParam : 65;
  STATE.initialConfidence = 3;
  STATE.initialKappa      = 18;
  STATE.initialAlpha      = 9;
  STATE.initialBeta       = 9;

  STATE.perfManagerIsAlex = (params.perf === 'sam') ? false : true;

  const start = (params.start === 'sam' || params.start === 'alex') ? params.start : 'alex';
  STATE.currentManager    = start;
  STATE.firstRoundManager = start;
}

function synthesizeRoundsForDev(upToBlockCount) {
  STATE.rounds = [];
  for (let i = 0; i < upToBlockCount; i++) {
    const outcomes = [];
    const opponents = [];
    for (let k = 0; k < 10; k++) {
      outcomes.push(Math.random() < (STATE.gammaStar / 100) ? 'H' : 'L');
      opponents.push(2);
    }
    const hCount = outcomes.filter(o => o === 'H').length;
    STATE.rounds.push({
      roundNum: i + 1, blockNum: i + 1,
      manager: STATE.currentManager,
      transferred: i === 0 ? null : false,
      outcomes, opponentScores: opponents,
      hCount, earnings: hCount * CONFIG.payPerH,
      beliefTheta: 40, beliefGamma: 50,
    });
  }
}

const DEV_TARGETS = [
  { id: 'welcome',              group: 'Phase 1',       label: 'Welcome' },
  { id: 'consent',              group: 'Phase 1',       label: 'Consent' },
  { id: 'screening',            group: 'Phase 1',       label: 'Screening (attention check 1 + demographics)' },
  { id: 'quizInstructions',     group: 'Phase 1',       label: 'Quiz instructions (+ attention check 2)' },
  { id: 'quizComprehension',    group: 'Phase 1',       label: 'Quiz comprehension check' },
  { id: 'sampleQuestion',       group: 'Phase 1',       label: 'Sample question' },
  { id: 'predictionIntro',      group: 'Phase 1',       label: 'Predictions & prizes (BSR explainer)' },
  { id: 'scoreAndBelief',       group: 'Phase 1',       label: 'Score + prior belief (خ¼ + confidence + bin table)' },
  { id: 'practiceIntro',        group: 'Phase 1',       label: 'Practice intro (transition after belief)' },
  { id: 'practice',             group: 'Phase 1',       label: 'Practice round (pond warm-up â†’ routes to mTypes)' },
  { id: 'mTypes',               group: 'Phase 2 intro', label: 'Manager types (Performance vs Random mechanisms)' },
  { id: 'round1Reveal',         group: 'Phase 2 task',  label: 'Reveal Round 1 manager',            custom: true },
  { id: 'block1',               group: 'Phase 2 task',  label: 'Batch 1 signals (50)',              custom: true },
  { id: 'switch1',              group: 'Phase 2 task',  label: 'First stay/switch decision',        custom: true },
  { id: 'block2',               group: 'Phase 2 task',  label: 'Batch 2 (after stay/switch 1)',     custom: true },
  { id: 'switch2',              group: 'Phase 2 task',  label: 'Second stay/switch decision',       custom: true },
  { id: 'block3',               group: 'Phase 2 task',  label: 'Batch 3 (after stay/switch 2)',     custom: true },
  { id: 'endConfidence',        group: 'Phase 3',       label: 'End-of-study confidence + reasons', custom: true },
  { id: 'roundsComplete',       group: 'Phase 3',       label: 'Rounds complete' },
  { id: 'riskPreferences',      group: 'Phase 3',       label: 'Risk preferences (GPS)' },
  { id: 'patiencePreferences',  group: 'Phase 3',       label: 'Patience preferences (GPS)' },
  { id: 'ambiguityPreferences', group: 'Phase 3',       label: 'Ambiguity preferences' },
  { id: 'visualCheck',          group: 'Phase 3',       label: 'Visual check (Ebbinghaus â€” AI honeypot, silent log)' },
  { id: 'revealOption',         group: 'Phase 3',       label: 'Opt-in: learn quiz performance + manager identities' },
  { id: 'revealInfo',           group: 'Phase 3',       label: 'Reveal screen (if opted in)' },
  { id: 'results',              group: 'Phase 3',       label: 'Results / payment screen' },
];

function devJump(targetId, params) {
  setupDevBaseState(params);
  const t = DEV_TARGETS.find(x => x.id === targetId);
  if (!t) { showDevMenu('Unknown target: ' + targetId); return; }
  if (!t.custom) {
    showScreen(targetId);
    addDevBanner(t);
    return;
  }
  if (/^block\d$/.test(targetId)) {
    const n = parseInt(targetId.slice(5));
    synthesizeRoundsForDev(n - 1);
    STATE.currentBlockIdx = n - 1;
    renderBlock(null);
  } else if (targetId === 'round1Reveal') {
    STATE.currentBlockIdx = 0;
    showRound1ManagerReveal();
  } else if (/^switch\d$/.test(targetId)) {
    const n = parseInt(targetId.slice(6));
    synthesizeRoundsForDev(n);
    STATE.currentBlockIdx = n;
    showSwitchChoiceScreen();
  } else if (targetId === 'endConfidence') {
    synthesizeRoundsForDev(CONFIG.blocks.length);
    STATE.currentBlockIdx = CONFIG.blocks.length - 1;
    showEndConfidence();
  }
  addDevBanner(t);
}

function showDevMenu(error) {
  const groups = {};
  DEV_TARGETS.forEach(t => { (groups[t.group] = groups[t.group] || []).push(t); });
  const base = window.location.pathname + '?dev=1&jump=';
  const groupHTML = Object.keys(groups).map(g => `
    <h3 style="font-size:0.9rem;color:#475569;margin:18px 0 8px;">${g}</h3>
    <ul style="list-style:none;padding:0;margin:0;">
      ${groups[g].map(t => `<li style="margin:4px 0;"><a href="${base}${t.id}" style="color:#2563eb;text-decoration:none;font-size:0.95rem;">${t.label}</a> <code style="color:#94a3b8;font-size:0.8rem;margin-left:6px;">${t.id}</code></li>`).join('')}
    </ul>`).join('');
  container.innerHTML = `
    <div class="screen-header"><h2>Dev menu â€” screen jumper</h2></div>
    ${error ? `<p style="color:#dc2626;">${error}</p>` : ''}
    <p style="font-size:0.93rem;color:#475569;">Click a target to jump there with default state. Add URL params <code>?easy=1</code>/<code>?hard=1</code>, <code>?score=N</code>, <code>?shared=N</code>, <code>?start=alex|sam</code>, <code>?perf=alex|sam</code> to tweak the underlying state.</p>
    ${groupHTML}
    <p style="margin-top:24px;font-size:0.85rem;color:#94a3b8;">Dev mode is active because <code>?dev=1</code> is set. It is disabled automatically on remote hosts.</p>`;
  addDevBanner(null);
}

function addDevBanner(target) {
  let banner = document.getElementById('dev-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'dev-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fef3c7;border-bottom:1px solid #fbbf24;color:#78350f;font-size:0.78rem;padding:4px 12px;z-index:9999;display:flex;justify-content:space-between;align-items:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;';
    document.body.appendChild(banner);
    document.body.style.paddingTop = '24px';
  }
  const label = target ? `â†’ ${target.id} (${target.label})` : 'â†’ dev menu';
  const base  = window.location.pathname + '?dev=1';
  banner.innerHTML = `
    <span><strong>DEV</strong> &nbsp; ${label}</span>
    <span>
      <a href="${base}" style="color:#78350f;text-decoration:underline;margin-right:14px;">menu</a>
      <a href="${window.location.pathname}" style="color:#78350f;text-decoration:underline;">exit dev</a>
    </span>`;
}

function init() {
  getUrlParams();
  STATE.startTime = Date.now();

  const params = Object.fromEntries(new URLSearchParams(window.location.search));
  if (params.dev === '1' && isDevAllowed()) {
    if (params.jump) devJump(params.jump, params);
    else             showDevMenu();
    return;
  }

  // Randomize Alex/Sam colors (purple vs teal) and name order, once per session
  const palette = ['#6d28d9', '#0e7490']; // purple, teal â€” both far from H-green and L-red
  if (Math.random() < 0.5) {
    STATE.alexColor = palette[0]; STATE.samColor = palette[1];
  } else {
    STATE.alexColor = palette[1]; STATE.samColor = palette[0];
  }
  document.documentElement.style.setProperty('--eval-color-alex', STATE.alexColor);
  document.documentElement.style.setProperty('--eval-color-sam', STATE.samColor);
  STATE.nameOrder = Math.random() < 0.5 ? ['alex', 'sam'] : ['sam', 'alex'];
  STATE.mgrBeliefLeft = Math.random() < 0.5;     // treatment: manager-type belief left vs right panel
  if (isMobileDevice()) {
    showMobileBlocked();
    return;
  }
  showScreen('welcome');
}

// Start
init();
</script>
