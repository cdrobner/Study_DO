//  `mTypesCheck` → `startManagerTask()`.)

function renderComprehensionCheck(checkConfig, onPass, checkId) {
  const { prompt, items, backScreen } = checkConfig;
  const attempts = STATE.comprehensionAttempts[checkId] || 0;

  // Fisher-Yates shuffle items once per (participant × checkId). The shuffled
  // order is cached on window so "← Back to instructions" and re-entry restore
  // the same order. Analysis by qid is content-addressed regardless of display
  // order; the shuffle just removes position-based bias on screen.
  window._comprehensionItemsByCheck = window._comprehensionItemsByCheck || {};
  let displayItems = window._comprehensionItemsByCheck[checkId];
  if (!displayItems) {
    displayItems = items.slice();
    for (let i = displayItems.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [displayItems[i], displayItems[j]] = [displayItems[j], displayItems[i]];
    }
    window._comprehensionItemsByCheck[checkId] = displayItems;
  }

  container.innerHTML = `
    <h2 class="m-h1">Comprehension Check</h2>
    <p>${prompt}</p>
    <div id="check-items">
      ${displayItems.map((item, i) => `
        <label class="check-item" id="check-item-${i}">
          <input type="checkbox" id="check-${i}" data-correct="${item.correct}" data-qid="${item.qid || ('item' + i)}">
          <span>${item.text}</span>
        </label>
      `).join('')}
    </div>
    <div class="error-msg" id="check-error">Some answers are incorrect.${attempts === 0 ? ' Please review and try again. You may go back to re-read the instructions.' : ''}</div>
    <div class="nav-row" style="justify-content:space-between;">
      <button class="btn" style="background:#e2e8f0;color:#334155;" onclick="showScreen('${backScreen}')">← Back to instructions</button>
      <button class="btn btn-primary" onclick="validateComprehension()" id="check-submit-btn">Submit</button>
    </div>`;

  // Store callback and checkId
  window._comprehensionCallback = onPass;
  window._comprehensionCheckId = checkId;
}

function validateComprehension() {
  const items = document.querySelectorAll('#check-items input[type="checkbox"]');
  const checkId = window._comprehensionCheckId;
  let allCorrect = true;

  items.forEach((input, i) => {
    const isCorrect = input.dataset.correct === 'true';
    const isChecked = input.checked;
    if (isChecked !== isCorrect) {
      allCorrect = false;
    }
  });

  // Record detailed responses for this attempt (with qid for content-addressed analysis)
  const attemptNum = (STATE.comprehensionAttempts[checkId] || 0) + 1;
  const responses = Array.from(items).map((input, i) => ({
    qid: input.dataset.qid || ('item' + i),
    itemIndex: i,
    checked: input.checked,
    correct: input.dataset.correct === 'true',
    isError: input.checked !== (input.dataset.correct === 'true'),
  }));
  STATE.comprehensionDetail.push({
    checkId,
    attempt: attemptNum,
    timestamp: Date.now(),
    passed: allCorrect,
    responses,
  });

  if (allCorrect) {
    STATE.comprehensionAttempts[checkId] = attemptNum - 1; // store number of *failed* attempts
    // Show the review panel (color-coded items + Continue button), then proceed.
    showComprehensionReview(items, window._comprehensionCallback);
  } else {
    STATE.comprehensionAttempts[checkId] = attemptNum;
    document.getElementById('check-error').classList.add('visible');
  }
}

// Replace the items + Submit button with a color-coded review of the truth
// value of each item (green ✓ for TRUE statements, red ✗ for FALSE statements),
// plus a Continue button that fires `onContinue` (the original onPass callback).
// `opts.itemsContainerId`: id of the <div> holding the checkbox items.
// `opts.navSelector`: CSS selector for the nav element to replace.
// `opts.errorElementId`: optional id of an error message element to hide.
// `opts.hideElementIds`: optional list of ids to hide (e.g., feedback textarea).
function showComprehensionReview(items, onContinue, opts) {
  opts = opts || {};
  const itemsContainerId = opts.itemsContainerId || 'check-items';
  const navSelector      = opts.navSelector      || '.nav-row';
  const errorElementId   = opts.errorElementId   || 'check-error';

  const itemNodes = Array.from(items);
  const reviewHTML = itemNodes.map((input) => {
    const isTrue = input.dataset.correct === 'true';
    const text   = input.parentNode.querySelector('span').innerHTML;
    const mark   = isTrue ? '✓' : '✗';
    const tag    = isTrue ? 'TRUE' : 'FALSE';
    const cls    = isTrue ? 'true' : 'false';
    return `<div class="check-review-item ${cls}">
              <span class="check-review-mark">${mark}</span>
              <span>${text} <span class="check-review-tag">${tag}</span></span>
            </div>`;
  }).join('');

  const itemsEl = document.getElementById(itemsContainerId);
  if (itemsEl) itemsEl.innerHTML = reviewHTML;

  const errEl = document.getElementById(errorElementId);
  if (errEl) errEl.classList.remove('visible');

  // Hide any additional elements (e.g., the clarity-feedback textarea + label).
  (opts.hideElementIds || []).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });

  // Replace the nav row with a single Continue button.
  window._reviewContinue = onContinue;
  const nav = document.querySelector(navSelector);
  if (nav) {
    nav.innerHTML = `<button class="btn btn-primary" onclick="window._reviewContinue()">Continue →</button>`;
    nav.style.justifyContent = 'flex-end';
  }

  // Banner above the items.
  if (itemsEl && !document.getElementById('check-review-banner')) {
    const banner = document.createElement('div');
    banner.id = 'check-review-banner';
    banner.className = 'check-review-banner';
    banner.textContent = 'All correct! Here is a quick recap of which statements are true and which are false.';
    itemsEl.parentNode.insertBefore(banner, itemsEl);
  }
}

// ---- Block-based manager task (free selection → 5 feedback sets → 2 stay/switch points) ----
// CONFIG.blocks defines the sequence. The participant freely selects their starting
// manager before set 1; stay/switch decisions precede sets 2 and 4. After every set
// we elicit manager-type (θ̂) + performance (γ) beliefs.

function startManagerTask() {
  STATE.currentBlockIdx = 0;
  showFreeSelectionScreen();
}

// ---- Two-worlds pegged manager-type belief control ----
// Each face gets a slider whose value = P(that person = Performance Manager),
// 0 (left, ↻ Random) → 100 (right, Performance ■). The two sliders are pegged:
// P(Alex=Perf) + P(Sam=Perf) = 100, so moving one moves the other oppositely.
function twReadoutText(perfVal) {
  const p = parseInt(perfVal), r = 100 - p;
  return `<span class="tw-rand">↻ Random ${r}%</span><span class="tw-sep">·</span><span class="tw-perf">■ Performance ${p}%</span>`;
}
function twoWorldCardHTML(person, perfVal, showNums) {
  const rd = showNums ? twReadoutText(perfVal) : '—';
  return `<div class="tw-card">
    <div class="avatar-c">${avatarSVG(person, 76)}</div>
    <div class="tw-name">${managerName(person)}</div>
    <input type="range" id="tw-slider-${person}" class="mslider slider-untouched" min="0" max="100" value="${perfVal}" oninput="onTwoWorldChange('${person}', this.value)" onpointerdown="markThetaTouched()">
    <div class="tw-ends"><span>↻ Random</span><span>Performance ■</span></div>
    <div class="tw-readout" id="tw-readout-${person}">${rd}</div>
  </div>`;
}
// Pegged update: set the other slider/readout to the complement, then reveal Submit
// on the first round-1 interaction.
function onTwoWorldChange(person, val) {
  const v = parseInt(val), other = otherManager(person);
  const os = document.getElementById('tw-slider-' + other);
  if (os) os.value = 100 - v;
  const r1 = document.getElementById('tw-readout-' + person); if (r1) r1.innerHTML = twReadoutText(v);
  const r2 = document.getElementById('tw-readout-' + other); if (r2) r2.innerHTML = twReadoutText(100 - v);
  markThetaTouched();
}

// Set 1: free selection — participant picks their starting manager.
// No signals have yet been observed; both managers look identical (50/50 prior over types),
// so this is an uninformed choice in the design but expresses participant agency.
function showFreeSelectionScreen() {
  const order = STATE.nameOrder || ['alex', 'sam'];
  const [a, b] = order;
  window._firstPick = null;
  container.innerHTML = `
    <div class="eyebrow">Round 1</div>
    <h2 class="m-h1">Pick your starting manager</h2>
    <p class="lead">You have not received any bonuses yet, so both managers look identical. One of them is the Performance Manager (■) and the other is the Random Manager (↻), but you do not know which. At this time, there is a 50/50 chance:</p>
    <div class="worlds">
      <div class="world-card">
        <div class="world-pair"><span class="world-name">${managerName('alex')}</span><span class="world-eq">=</span><span class="pill pill-perf">Performance Manager</span></div>
        <div class="world-pair"><span class="world-name">${managerName('sam')}</span><span class="world-eq">=</span><span class="pill pill-rand">Random Manager</span></div>
      </div>
      <div class="world-or">or</div>
      <div class="world-card">
        <div class="world-pair"><span class="world-name">${managerName('alex')}</span><span class="world-eq">=</span><span class="pill pill-rand">Random Manager</span></div>
        <div class="world-pair"><span class="world-name">${managerName('sam')}</span><span class="world-eq">=</span><span class="pill pill-perf">Performance Manager</span></div>
      </div>
    </div>
    <p style="font-size:.95rem;color:#475569;margin:14px 0 6px;text-align:center;">Please pick your starting manager by clicking on one of the two managers below.</p>
    <div class="choice-row">
      <button class="btn btn-choice" id="opt-${a}" onclick="selectFirstManager('${a}')">
        <div class="avatar-c" style="margin-bottom:8px;">${avatarSVG(a,88)}</div>${managerName(a)}
      </button>
      <button class="btn btn-choice" id="opt-${b}" onclick="selectFirstManager('${b}')">
        <div class="avatar-c" style="margin-bottom:8px;">${avatarSVG(b,88)}</div>${managerName(b)}
      </button>
    </div>
    <div class="m-row-end"><button class="m-btn" id="first-pick-continue" disabled onclick="confirmFirstManager()">Continue →</button></div>`;
  updateProgress(0.50);
}

function selectFirstManager(mgr) {
  window._firstPick = mgr;
  const order = STATE.nameOrder || ['alex', 'sam'];
  order.forEach(m => {
    const btn = document.getElementById('opt-' + m);
    if (btn) btn.classList.toggle('selected', m === mgr);
  });
  const btn = document.getElementById('first-pick-continue');
  if (btn) btn.disabled = false;
}

function confirmFirstManager() {
  if (!window._firstPick) return;
  STATE.currentManager      = window._firstPick;
  STATE.firstRoundManager   = window._firstPick;
  beginBlock(0);
}

// Route into a block: show the appropriate choice screen first (if any), else signals.
function beginBlock(idx) {
  STATE.currentBlockIdx = idx;
  const choice = CONFIG.blocks[idx].choiceBefore;
  if (choice === 'switch') { showSwitchChoiceScreen(); return; }
  // 'free' selection is handled before beginBlock(0) by showFreeSelectionScreen();
  // 'none' carries over the current manager. Both fall through to signals directly.
  renderBlock(null);
}

// Previous beliefs oriented to a given manager.
function prevBeliefsFor(mgr) {
  let prevTheta = 50;
  let prevGamma = STATE.initialMu;
  if (STATE.rounds.length > 0) {
    const prev = STATE.rounds[STATE.rounds.length - 1];
    prevTheta = (prev.manager !== mgr) ? (100 - prev.beliefTheta) : prev.beliefTheta;
    prevGamma = prev.beliefGamma;
  }
  return { prevTheta, prevGamma };
}

// Choice point: stay or switch (defaults to stay).
function showSwitchChoiceScreen() {
  const green = STATE.randomProbShown;
  const currentMgr = STATE.currentManager;
  const otherMgr = otherManager(currentMgr);
  const { prevTheta, prevGamma } = prevBeliefsFor(currentMgr);
  const idx = STATE.currentBlockIdx;
  const nSignals = CONFIG.blocks[idx].signals;

  // Expected bonus pay per round under each option, computed from current beliefs.
  // P(green) = θ̂_M × γ̂ + (1 − θ̂_M) × γ*, where θ̂ flips for the other manager.
  const thetaCur  = prevTheta / 100;
  const thetaOth  = (100 - prevTheta) / 100;
  const gammaHat  = prevGamma / 100;
  const gStar     = green / 100;
  const pCur = thetaCur * gammaHat + (1 - thetaCur) * gStar;
  const pOth = thetaOth * gammaHat + (1 - thetaOth) * gStar;
  // Show counts (out of nSignals) and the implied dollar amount.
  const greensCur = Math.round(nSignals * pCur);
  const greensOth = Math.round(nSignals * pOth);
  const dollarsCur = (greensCur * CONFIG.payPerH).toFixed(2);
  const dollarsOth = (greensOth * CONFIG.payPerH).toFixed(2);

  window._switchChoice = null;
  container.innerHTML = `
    <div class="eyebrow">Round ${idx + 1} of ${CONFIG.blocks.length} — Your choice</div>
    <h2 class="m-h1">Stay or switch?</h2>
    <p class="lead">You can now choose your manager for the next round of bonuses.</p>
    <p class="lead" style="margin-top:8px;">Expected bonuses next round (given your current belief):</p>
    <ul class="expected-pay-list">
      <li>from <strong>${managerName(currentMgr)}</strong>: <strong>${greensCur} of ${nSignals}</strong> green &rarr; <strong>£${dollarsCur}</strong></li>
      <li>from <strong>${managerName(otherMgr)}</strong>: <strong>${greensOth} of ${nSignals}</strong> green &rarr; <strong>£${dollarsOth}</strong></li>
    </ul>
    <p class="lead" style="margin-top:8px;">Do you want to stay with ${managerName(currentMgr)} or switch to ${managerName(otherMgr)}?</p>
    <div class="choice-row">
      <button class="btn btn-choice" id="opt-stay" onclick="selectSwitch('stay')">
        <div class="avatar-c" style="margin-bottom:8px;">${avatarSVG(currentMgr,72)}</div>Stay with ${managerName(currentMgr)}
      </button>
      <button class="btn btn-choice" id="opt-switch" onclick="selectSwitch('switch')">
        <div class="avatar-c" style="margin-bottom:8px;">${avatarSVG(otherMgr,72)}</div>Switch to ${managerName(otherMgr)}
      </button>
    </div>
    <div class="m-row-end"><button class="m-btn" id="switch-continue-btn" disabled onclick="confirmSwitch()">Continue →</button></div>`;
  updateProgress(0.58 + (STATE.currentBlockIdx / CONFIG.blocks.length) * 0.30);
}
function selectSwitch(c) {
  window._switchChoice = c;
  document.getElementById('opt-stay').classList.toggle('selected', c === 'stay');
  document.getElementById('opt-switch').classList.toggle('selected', c === 'switch');
  const btn = document.getElementById('switch-continue-btn');
  if (btn) btn.disabled = false;
}
function confirmSwitch() {
  makeSwitchChoice(window._switchChoice === 'switch');
}

function makeSwitchChoice(switched) {
  const prevMgr = STATE.currentManager;
  if (switched) STATE.currentManager = otherManager(STATE.currentManager);
  renderBlock({ type: 'switch', switched: switched, prevManager: prevMgr });
}

// Build the block screen scaffold + generate signals.
// Round flow (Alternative B): each step replaces container content fully.
// Step 1: Primer (manager intro + informativeness + Round-1-only expected counts)
// Step 2: Payments revealed (ledger + summary)
// Step 3: γ update (compact header carries forward; γ slider only)
// Step 4: θ̂ update (compact header + comparison panel + θ̂ slider)
function renderBlock(choiceInfo) {
  const idx = STATE.currentBlockIdx;
  const block = CONFIG.blocks[idx];
  const mgr = STATE.currentManager;
  const transferred = choiceInfo
    ? (choiceInfo.type === 'switch' ? choiceInfo.switched : !choiceInfo.stayed)
    : null;
  window._pendingRound = {
    roundNum: idx + 1, blockNum: idx + 1,
    manager: mgr, signals: block.signals,
    choiceBefore: block.choiceBefore, choiceInfo, transferred,
    outcomes: null, opponentScores: null, hCount: null, earnings: null,
    beliefTheta: null, beliefGamma: null,
    tsRoundStart: Date.now(), tsFeedbackShown: null, tsBeliefsShown: null,
    tsBeliefsSubmit: null, tsChoiceMade: choiceInfo ? Date.now() : null,
  };
  // Round 1 keeps its full intro (layered primer + "Before you start" clarity
  // check). Rounds 2–4 skip the long "Bonuses from {name}" page and go straight
  // to the banner-based combined page, with the banner reflecting the most
  // recently elicited beliefs.
  if (idx === 0) {
    renderStepPrimerLayered();
  } else {
    renderRoundCombined();
  }
  updateProgress(0.58 + ((idx + 1) / CONFIG.blocks.length) * 0.30);
}

// Round-1 layered primer: each element appears on a click (2 clicks), then the
// "See this round's bonuses" button appears. Build order:
//   initial : anchor line + center "If NAME is…" + both arrows (Performance,
//             Random) + both cards' first instructions
//   click 1 : both second-level instructions (expected payment under each type)
//   click 2 : two cross-column takeaway lines, then reveal Continue
function renderStepPrimerLayered() {
  const blockData = window._pendingRound;
  const idx = STATE.currentBlockIdx;
  const nSignals = blockData.signals;
  const mgr = blockData.manager;
  const name = managerName(mgr);
  const { prevTheta, prevGamma } = prevBeliefsFor(mgr);
  const green = STATE.randomProbShown;
  const perfExpected = Math.round(prevGamma * nSignals / 100);
  const randExpected = Math.round(green * nSignals / 100);

  // Two directions of inference, shown in a counterbalanced order (STATE.takeawayTypeFirst).
  const tType = `<strong>About ${name}'s type:</strong> If your count of green bonuses is closer to <strong>${perfExpected} of ${nSignals}</strong> (what a Performance Manager would produce given your beliefs), ${name} is more likely a Performance Manager. If it is closer to <strong>${randExpected} of ${nSignals}</strong> (what a Random Manager would produce), ${name} is more likely a Random Manager.`;
  const tPerf = `<strong>About your quiz performance:</strong> only a Performance Manager's bonuses provide new information about your quiz performance. So the more likely you think ${name} is the Performance Manager, the more the bonuses tell you about your performance.`;
  const takeawayList = (STATE.takeawayTypeFirst !== false) ? [tType, tPerf] : [tPerf, tType];

  window._primerStep = 0;
  window._primerMaxStep = 1;

  container.innerHTML = `
    <div class="eyebrow">Round ${idx + 1} of ${CONFIG.blocks.length}</div>
    <h2 class="m-h1">Bonuses from ${name}</h2>
    <div class="round-header" style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="avatar-c">${avatarSVG(mgr, 64)}</div>
      <div class="round-header-name">${name}</div>
    </div>

    <div id="primer-reveal">
      <p class="primer-anchor">What the ${nSignals} bonuses you receive in this round mean depends on ${name}'s type.</p>
      <div class="if-fork-node"><span class="if-fork-center">If ${name} is…</span></div>
      <div class="fork-connector">${forkConnectorSVG()}</div>
      <div class="ptype-grid">
        <div class="ptype-card ptype-perf">
          <span class="pill pill-perf">Performance Manager</span>
          <p class="ptype-info">You get a <strong>green</strong> bonus for each time your quiz score beats another participant's score.</p>
          <p>You indicated that you expect to beat <strong>${prevGamma} of the 100</strong> participants.</p>
          <p>Therefore, you would expect about <strong>${perfExpected} of the ${nSignals}</strong> bonuses to be green.</p>
        </div>
        <div class="ptype-card ptype-rand">
          <span class="pill pill-rand">Random Manager</span>
          <p class="ptype-info">You get a <strong>green</strong> bonus each time the wheel of fortune lands on a green field.</p>
          <p>The Random Manager's wheel of fortune has <strong>100 fields</strong>: <strong>${green} are green</strong>.</p>
          <p>Therefore, you would expect about <strong>${randExpected} of the ${nSignals}</strong> bonuses to be green.</p>
        </div>
      </div>
      <div class="primer-takeaways" data-rstep="1" style="display:none;">
        <p class="primer-takeaways-intro">Observing the bonuses can teach you about two things at once:</p>
        <div class="primer-takeaway-item">1. ${takeawayList[0]}</div>
        <div class="primer-takeaway-item">2. ${takeawayList[1]}</div>
      </div>
    </div>

    <div class="m-row-end">
      <button class="m-btn m-btn-ghost" id="primer-next-btn" onclick="primerReveal()">Continue →</button>
      <span id="primer-continue-wrap" style="display:none;"><button class="m-btn" onclick="renderClarityCheck()">Proceed, I understand</button></span>
    </div>`;
}

// Round-1 comprehension check (inserted between the layered primer and the
// bonuses). The participant must select exactly the true statements before they
// can continue to Round 1 (gated by validateClarityCheck). They may go back to
// re-read the instructions at any time. Selections, correctness, and the
// free-text feedback are recorded for the data export.
function renderClarityCheck() {
  const idx = STATE.currentBlockIdx;
  const name = managerName(window._pendingRound.manager);
  // Round-1 clarity questions, phrased with the chosen manager's name. The
  // display order is randomized once (stored on window so back-navigation from
  // "re-read instructions" keeps the same order and restores selections).
  const green = STATE.randomProbShown;
  if (!window._clarityItems) {
    const items = [
      { qid: 'mech',      correct: true,  text: `The Performance Manager's bonuses depend on my quiz score, while the Random Manager's bonuses come from a wheel of fortune with ${green} green and ${100 - green} red fields.` },
      { qid: 'revise',    correct: true,  text: `If I am confident that ${name} is the Performance Manager, I should strongly revise my belief about my quiz performance based on the bonuses. If I am confident ${name} is the Random Manager, I should barely revise my belief about my quiz performance.` },
      { qid: 'accuracy_pays', correct: false, text: `The accuracy of my answers to the belief questions has <strong>no</strong> effect on my payment.` },
      { qid: 'type',      correct: true,  text: `Observing the bonuses over time can teach me about whether ${name} is the Performance or the Random Manager.` },
    ];
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    window._clarityItems = items;
  }
  const clarityItems = window._clarityItems;
  const clarityPrompt = 'Which of the following statements are <strong>true</strong>? (Select all that are true.)';
  const compHTML = clarityItems.map((item, i) => `
        <label class="check-item" id="clarity-comp-item-${i}">
          <input type="checkbox" id="clarity-comp-${i}" data-correct="${item.correct}" data-qid="${item.qid}">
          <span>${item.text}</span>
        </label>`).join('');

  container.innerHTML = `
    <div class="eyebrow">Round ${idx + 1} of ${CONFIG.blocks.length}</div>
    <h2 class="m-h1">Before you start Round 1</h2>

    <p class="lead" style="margin-top:4px;">${clarityPrompt}</p>
    <div id="clarity-check-items">${compHTML}</div>

    <p class="lead" id="clarity-feedback-prompt" style="margin-top:22px;">Are the instructions clear? Please tell us if you found anything confusing.</p>
    <textarea id="clarity-feedback" rows="4" placeholder="Optional — type anything that was unclear..."
      style="width:100%;margin-top:8px;padding:10px 12px;font-size:0.95rem;border:1px solid #ccc;border-radius:6px;resize:vertical;font-family:inherit;">${STATE.clarityFeedback || ''}</textarea>

    <div class="error-msg" id="clarity-error">Not quite — one or more answers are incorrect. Please review the statements and try again. You can go back to re-read the instructions.</div>
    <div class="m-row-end" id="clarity-nav" style="margin-top:18px;justify-content:space-between;">
      <button class="m-btn m-btn-ghost" onclick="saveClarityFeedback(); renderStepPrimerLayered()">Go back to read instructions again</button>
      <button class="m-btn" onclick="validateClarityCheck()">Continue →</button>
    </div>`;

  // Restore prior selections if the participant came back from re-reading.
  // Stored as question ids (order-independent), matched against the current
  // shuffled display order.
  if (Array.isArray(STATE.clarityComprehension)) {
    clarityItems.forEach((item, i) => {
      if (STATE.clarityComprehension.includes(item.qid)) {
        const cb = document.getElementById('clarity-comp-' + i);
        if (cb) cb.checked = true;
      }
    });
  }
}

function saveClarityFeedback() {
  const ta = document.getElementById('clarity-feedback');
  if (ta) STATE.clarityFeedback = ta.value;
  const inputs = document.querySelectorAll('#clarity-check-items input[type="checkbox"]');
  if (inputs.length) {
    const sel = [];
    let allCorrect = true;
    inputs.forEach((cb) => {
      if (cb.checked) sel.push(cb.dataset.qid);
      if (cb.checked !== (cb.dataset.correct === 'true')) allCorrect = false;
    });
    STATE.clarityComprehension = sel;
    STATE.clarityComprehensionCorrect = allCorrect;
  }
}

// Gating check: the participant cannot proceed to Round 1 until every statement
// is answered correctly. On a wrong submission, an error is shown and they stay
// on this page (they may go back to re-read the instructions and try again).
//
// Per-attempt tracking: each call pushes an entry into STATE.comprehensionDetail
// with checkId 'clarityCheck' (same shape as mTaskCheck / mTypesCheck). Flat
// columns are derived from comprehensionDetail at submission time via
// extractCheckFlatFields('clarityCheck', 'clarity_check', [...]).
function validateClarityCheck() {
  saveClarityFeedback();

  // Build the per-item response array for this attempt (qid + itemIndex + checked + correct + isError).
  const checkboxes = document.querySelectorAll('#clarity-check-items input[type="checkbox"]');
  const responses = Array.from(checkboxes).map((cb, i) => ({
    qid: cb.dataset.qid || ('item' + i),
    itemIndex: i,
    checked: cb.checked,
    correct: cb.dataset.correct === 'true',
    isError: cb.checked !== (cb.dataset.correct === 'true'),
  }));

  const allCorrect = !!STATE.clarityComprehensionCorrect;
  const priorAttempts = (STATE.comprehensionDetail || [])
    .filter(d => d.checkId === 'clarityCheck').length;
  const attemptNum = priorAttempts + 1;

  STATE.comprehensionDetail.push({
    checkId: 'clarityCheck',
    attempt: attemptNum,
    timestamp: Date.now(),
    passed: allCorrect,
    responses,
  });

  if (allCorrect) {
    showComprehensionReview(checkboxes, renderRoundCombined, {
      itemsContainerId: 'clarity-check-items',
      navSelector: '#clarity-nav',
      errorElementId: 'clarity-error',
      hideElementIds: ['clarity-feedback-prompt', 'clarity-feedback'],
    });
  } else {
    document.getElementById('clarity-error').classList.add('visible');
  }
}

function primerReveal() {
  window._primerStep = (window._primerStep || 0) + 1;
  const step = window._primerStep;
  document.querySelectorAll('#primer-reveal [data-rstep]').forEach(el => {
    if (parseInt(el.getAttribute('data-rstep')) <= step) el.style.display = '';
  });
  if (step >= (window._primerMaxStep || 3)) {
    document.getElementById('primer-next-btn').style.display = 'none';
    document.getElementById('primer-continue-wrap').style.display = '';
  }
}

// ---- Combined round page (banner → click-to-reveal bonuses → beliefs) ----
// Used for every round. The banner summarizes the most recently elicited beliefs
// and the implied expected payment under each manager type. The bonuses are
// hidden behind a "click to reveal" button; the belief questions appear after

  const blockData = window._pendingRound;
  const idx = STATE.currentBlockIdx;
  const mgr = blockData.manager;
  const name = managerName(mgr);
  const nSignals = blockData.signals;
  const { prevTheta, prevGamma } = prevBeliefsFor(mgr);
  const theta = prevTheta;                // Going-in type belief (50/50 in Round 1).
  const green = STATE.randomProbShown;
  const perfExpected = Math.round(prevGamma * nSignals / 100);

  // Round 1: the manager-type prior is INDUCED 50/50 (not elicited), so present it as a
  // starting point ("unknown so far"), not the participant's belief. Rounds 2+: their
  // elicited current beliefs. (The quiz-performance belief IS elicited in every round.)
  const isR1 = idx === 0;
  const beliefsHeader = isR1 ? `Where you stand going into Round 1:` : `Your current beliefs:`;
  const typeLi = isR1
    ? `<li><strong>${name}'s type:</strong> unknown so far — a 50% chance of Performance, 50% chance of Random</li>`
    : `<li><strong>${name}'s type:</strong> ${theta}% Performance / ${100 - theta}% Random</li>`;
  const quizLi = isR1
    ? `<li><strong>Your quiz-performance belief:</strong> beat ${prevGamma} of 100 participants</li>`
    : `<li><strong>Quiz performance:</strong> You expect to beat ${prevGamma} of 100 participants</li>`;
  container.innerHTML = `
    <div class="eyebrow">Round ${idx + 1} of ${CONFIG.blocks.length}</div>

    <div class="round-header" id="round-current-beliefs" style="display:flex;align-items:flex-start;gap:18px;">
      <div style="display:flex;flex-direction:column;align-items:center;flex:0 0 auto;">
        <div class="avatar-c">${avatarSVG(mgr, 64)}</div>
        <div class="round-header-name" style="margin-top:6px;">${name}</div>
      </div>
      <div style="flex:1 1 0;min-width:0;font-size:0.92rem;line-height:1.55;color:#374151;">
        <div style="font-weight:600;margin-bottom:4px;">${beliefsHeader}</div>
        <ul style="margin:0;padding-left:20px;">
          ${typeLi}
          ${quizLi}
        </ul>
      </div>
    </div>

    <p class="lead" style="margin:18px 0 8px;font-weight:600;">What to expect from this round, given your current beliefs:</p>
    <div class="rc-expect-grid">
      <div class="rc-expect-card rc-expect-perf">
        <span class="pill pill-perf">If ${name} is PERFORMANCE</span>
        <p class="rc-expect-line">Expect about <strong>${perfExpected} of ${nSignals}</strong> green</p>
      </div>
      <div class="rc-expect-card rc-expect-rand">
        <span class="pill pill-rand">If ${name} is RANDOM</span>
        <p class="rc-expect-line">Expect about <strong>${randExpected} of ${nSignals}</strong> green</p>
      </div>
    </div>

    <div id="r1-bonus-area" style="margin-top:20px;"></div>
    <div class="m-row-end" id="r1-reveal-wrap" style="margin-top:18px;">
      <button class="m-btn" id="r1-reveal-btn" onclick="roundRevealBonuses()">Click to reveal the bonuses from ${name}</button>
    </div>
    <div id="r1-belief-area" style="display:none;margin-top:8px;"></div>
    <div class="m-row-end" id="r1-next-wrap" style="display:none;margin-top:18px;">
      <button class="m-btn" onclick="roundShowBeliefs()">Continue →</button>
    </div>`;
}

// Generate this round's outcomes and reveal the bonus ledger in place, then
// show the "Next" button (which reveals the belief questions).
function roundRevealBonuses() {
  const blockData = window._pendingRound;
  const nSignals = blockData.signals;
  const name = managerName(blockData.manager);
  blockData.tsFeedbackShown = Date.now();

  const { outcomes, opponents } = generateOutcomes(STATE.quizScoreShared, nSignals);
  const hCount = outcomes.filter(o => o === 'H').length;
  const earnings = hCount * CONFIG.payPerH;
  blockData.outcomes = outcomes;
  blockData.opponentScores = opponents;
  blockData.hCount = hCount;
  blockData.earnings = earnings;

  const nUnpaid = nSignals - hCount;
  const pctGreen = Math.round((hCount / nSignals) * 100);
  // Compact grid for large batches, sorted greens-first so the proportion is legible
  // (display only — blockData.outcomes keeps the generated order). Per-chip ledger for small.
  const displayOut = outcomes.slice().sort((a, b) => (a === 'H' ? 0 : 1) - (b === 'H' ? 0 : 1));
  const isCompact = nSignals > 10;
  const ledgerHtml = isCompact
    ? `<div class="ledger-row-compact">${displayOut.map((o) =>
         `<div class="ledger-cell-compact ${o === 'H' ? 'paid' : 'unpaid'}" aria-label="${o === 'H' ? 'green' : 'red'}"></div>`
       ).join('')}</div>`
    : `<div class="ledger-row">${outcomes.map((o, i) =>
         `<div class="ledger-cell ${o === 'H' ? 'paid' : 'unpaid'}">
            <div class="ledger-num">${i + 1}</div>
            <div class="ledger-amt">${o === 'H' ? 'green' : 'red'}</div>
          </div>`
       ).join('')}</div>`;
  document.getElementById('r1-bonus-area').innerHTML = `
    <h2 class="m-h1">${nSignals} Bonuses from ${name}</h2>
    ${ledgerHtml}
    <p class="ledger-summary"><strong>${hCount} of ${nSignals} (${pctGreen}%)</strong> bonuses from ${name} this round are green.</p>`;

  document.getElementById('r1-reveal-wrap').style.display = 'none';
  document.getElementById('r1-next-wrap').style.display = '';
}

// Reveal the two belief questions in place (manager type + quiz performance),
// ordered by the STATE.mgrBeliefLeft treatment. Round 1 forces a slider touch
// before Submit; later rounds start from prior beliefs. Submit reuses
// submitBlockBeliefs().
function roundShowBeliefs() {
  const blockData = window._pendingRound;
  blockData.tsBeliefsShown = Date.now();
  const mgr = blockData.manager;
  const name = managerName(mgr);
  const { prevTheta, prevGamma } = prevBeliefsFor(mgr);

  // v2: every round requires a deliberate touch on BOTH belief sliders (confirm or
  // change) before Submit appears — the thumb stays on the prior belief so a real
  // "no change" is a one-click confirm, not a lazy default. Round 1 still hides the
  // θ numeric readout (no 50/50 anchor) until first engagement.
  const isFirstTheta = STATE.rounds.length === 0;
  window._thetaTouched = false;
  window._gammaTouched = false;
  const initTheta = isFirstTheta ? 50 : prevTheta;
  const showNums = !isFirstTheta;
  const navStyle = 'display:none;';
  const perfOf = {};
  perfOf[mgr] = initTheta;
  perfOf[otherManager(mgr)] = 100 - initTheta;
  const startGamma = prevGamma;
  blockData.priorTheta = initTheta;    // going-in θ about the current manager (50 in round 1)
  blockData.priorGamma = startGamma;   // going-in γ

  const mgrSection = `
      <div class="belief-section">
        <div class="belief-section-h">${name}'s type</div>
        <div class="tw-stack">
          ${twoWorldCardHTML(mgr, perfOf[mgr], showNums)}
          ${twoWorldCardHTML(otherManager(mgr), perfOf[otherManager(mgr)], showNums)}
        </div>
      </div>`;
  const quizSection = `
      <div class="belief-section">
        <div class="belief-section-h">Your quiz performance</div>
        <div class="mq-label">Out of the 100 Prolific participants, how many do you expect to beat on the shared questions?</div>
        <div class="gamma-slider-wrap">
          <input type="range" id="gamma-round-slider" class="mslider slider-untouched" min="0" max="100" value="${startGamma}" oninput="onRoundGammaChange(this.value)" onpointerdown="markGammaTouched()">
        </div>
        <div class="mval">I expect to beat <strong><span id="gamma-round-val">${startGamma}</span></strong> out of 100.</div>
        <div class="grid-c">${beliefGridSVG(startGamma)}</div>
      </div>`;
  const colsInner = STATE.mgrBeliefLeft ? (mgrSection + quizSection) : (quizSection + mgrSection);

  document.getElementById('r1-next-wrap').style.display = 'none';
  // Drop the "Your current beliefs" banner once the sliders reveal — it is redundant
  // with the sliders (which start on the prior) and frees space so the bonuses +
  // sliders sit together. The "What to expect" cards stay.
  const cb = document.getElementById('round-current-beliefs'); if (cb) cb.style.display = 'none';
  const area = document.getElementById('r1-belief-area');
  // pilot_5 coaching: two conditionals (Random -> keep belief; Performance -> revise it),
  // with the revision magnitude from the gap between the signal-implied beat rate and the
  // going-in belief, adImp = |xxImplied - startGamma|: >15 substantially, 5-15 (plain) revise,
  // <5 slightly. Prior theta (initTheta) recalled AFTER the two conditionals.
  const nSig = blockData.signals;
  const xxImplied = Math.round((blockData.hCount / nSig) * 100);
  const dImp = xxImplied - startGamma, adImp = Math.abs(dImp);
  const magWord = adImp > 15 ? 'substantially ' : (adImp >= 5 ? '' : 'slightly ');
  const perfClause = adImp === 0
    ? `these bonuses are in line with your current belief of beating ${startGamma} out of 100 Prolific participants`
    : `these bonuses suggest that you beat <strong>${magWord}${dImp > 0 ? 'more' : 'less'}</strong> than ${startGamma} out of 100 Prolific participants`;
  // Round 1: manager-type prior is INDUCED 50/50 (not elicited) -> state it objectively
  // ("there was a 50% chance"), not as the participant's belief. Rounds 2+: recall their
  // own elicited prior theta ("you thought there was...").
  const thetaRecall = isFirstTheta
    ? `Going into this round there was a <strong>50% chance</strong> ${name} is a Performance Manager and a <strong>50% chance</strong> ${name} is a Random Manager.`
    : `Going into this round you thought there was a <strong>${initTheta}% chance</strong> ${name} is a Performance Manager and a <strong>${100 - initTheta}% chance</strong> ${name} is a Random Manager.`;
  const condPara  = `<p style="font-size:0.95rem;color:#374151;margin:0 0 10px;">If ${name} is the Random Manager, you should stick to your quiz performance belief of beating <strong>${startGamma} out of 100</strong> Prolific participants. If ${name} is the Performance Manager, ${perfClause}.</p>`;
  const thetaPara = `<p style="font-size:0.95rem;color:#374151;margin:0 0 10px;">${thetaRecall}</p>`;
  // TREATMENT (coachingThetaFirst): randomize whether the prior-θ recall comes BEFORE the two
  // conditionals (true) or AFTER them (false). Between-subject, fixed per participant.
  const coachParas = STATE.coachingThetaFirst ? (thetaPara + condPara) : (condPara + thetaPara);
  area.innerHTML = `
    <h2 class="m-h2-umbrella">How do these bonuses affect your beliefs about your quiz performance and ${name}'s type?</h2>
    ${coachParas}
    <div class="callout-attention"><strong>Please take your time to think carefully about your answers.</strong> You will have a higher chance of winning the belief payment if you provide the most accurate beliefs.</div>
    <div class="belief-cols">${colsInner}</div>
    <div class="m-row-end" id="beliefs-nav" style="${navStyle}"><button class="m-btn" onclick="submitBlockBeliefs()">Submit</button></div>`;
  area.style.display = '';
  updateGammaReadout(startGamma);   // init only — does NOT mark the slider as touched
}

// Update gamma readout + fill the belief grid (init/no-touch version)
function updateGammaReadout(val) {
  const v = parseInt(val);
  const e = document.getElementById('gamma-round-val'); if (e) e.textContent = v;
  updateBeliefGrid(v);
}
// User moved the performance slider
function onRoundGammaChange(val) {
  updateGammaReadout(val);
  markGammaTouched();
}
// ---- v2: require a deliberate touch on BOTH belief sliders before Submit ----
// Confirm-in-place (touching a slider without changing its value) is caught via
// onpointerdown, so a genuine "no change" still counts as engagement.
function markThetaTouched() {
  if (!window._thetaTouched) {
    window._thetaTouched = true;
    const mgr = window._pendingRound && window._pendingRound.manager;
    const s = mgr && document.getElementById('tw-slider-' + mgr);
    if (s) {   // reveal readouts + un-gray both pegged sliders on first engagement
      const v = parseInt(s.value), oth = otherManager(mgr);
      const r1 = document.getElementById('tw-readout-' + mgr); if (r1) r1.innerHTML = twReadoutText(v);
      const r2 = document.getElementById('tw-readout-' + oth); if (r2) r2.innerHTML = twReadoutText(100 - v);
      [mgr, oth].forEach(m => { const el = document.getElementById('tw-slider-' + m); if (el) el.classList.remove('slider-untouched'); });
    }
  }
  maybeShowBeliefsNav();
}
function markGammaTouched() {
  window._gammaTouched = true;
  const g = document.getElementById('gamma-round-slider'); if (g) g.classList.remove('slider-untouched');
  maybeShowBeliefsNav();
}
function maybeShowBeliefsNav() {
  if (window._thetaTouched && window._gammaTouched) {
    const nav = document.getElementById('beliefs-nav');
    if (nav) nav.style.display = '';
  }
}

// Submit beliefs → record block → advance to next block (or finish).
// Both θ̂ and γ are read here, since they now live on one combined page.
function submitBlockBeliefs() {
  const blockData = window._pendingRound;
  // beliefTheta = P(chosen manager = Performance) — read from that face's slider.
  blockData.beliefTheta = parseInt(document.getElementById('tw-slider-' + blockData.manager).value);
  blockData.beliefGamma = parseInt(document.getElementById('gamma-round-slider').value);
  // v2: with both sliders now requiring a deliberate touch, a "no change" is a real
  // confirm — record whether each belief was changed vs confirmed-in-place.
  blockData.thetaChanged = (blockData.beliefTheta !== blockData.priorTheta) ? 1 : 0;
  blockData.gammaChanged = (blockData.beliefGamma !== blockData.priorGamma) ? 1 : 0;
  blockData.tsBeliefsSubmit = Date.now();
  STATE.rounds.push(blockData);

  const next = STATE.currentBlockIdx + 1;
  if (next >= CONFIG.blocks.length) {
    showScreen('roundsComplete');
    return;
  }
  beginBlock(next);
}

    const w = 220, h = 260;
    const urnTop = 40, urnBottom = h - 10, urnLeft = 20, urnRight = w - 20, radius = 20;
    let svg = `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
    svg += `<rect x="${urnLeft}" y="${urnTop}" width="${urnRight - urnLeft}" height="${urnBottom - urnTop}" rx="${radius}" ry="${radius}" fill="#e0f2fe" stroke="#666" stroke-width="2"/>`;
    svg += `<rect x="${urnLeft - 4}" y="${urnTop - 2}" width="${urnRight - urnLeft + 8}" height="18" rx="4" fill="#888" stroke="#555" stroke-width="1.5"/>`;

    const cols = 10, rows = 10;
    const ballR = 7.5;
    const startX = urnLeft + 12, startY = urnTop + 28;
    const spacingX = (urnRight - urnLeft - 24) / (cols - 1);
    const spacingY = (urnBottom - urnTop - 50) / (rows - 1);

    if (type === 'ambiguous') {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = startX + c * spacingX;
          const cy = startY + r * spacingY;
          svg += `<circle cx="${cx}" cy="${cy}" r="${ballR}" fill="#f0f0f0" stroke="#999" stroke-width="1"/>`;
          svg += `<text x="${cx}" y="${cy + 3.5}" text-anchor="middle" font-size="9" fill="#888" font-weight="600">?</text>`;

    <p>${CONFIG.texts.ambiguityColorPrompt}</p>

// Comprehension check on the ambiguity task: which urn has a KNOWN composition?
// Correct answer is Urn B (50 white / 50 black). On correct, hide the check
// and reveal the urn-preference question. On wrong, show a hint and let them
// click the correct option to proceed.
function selectAmbiguityCheck(choice, btn) {
  const correct = (choice === 'B');
  STATE.ambiguityAnswers.checkChoice = choice;
  STATE.ambiguityAnswers.checkCorrectFirstTry =
    STATE.ambiguityAnswers.checkCorrectFirstTry ?? correct;
  const msgEl = document.getElementById('amb-check-msg');
  if (correct) {
    // Hide the whole check block and reveal the preference section.
    const checkSection = document.getElementById('amb-check-section');
    if (checkSection) checkSection.style.display = 'none';
    const urnSection = document.getElementById('amb-urn-section');
    if (urnSection && urnSection.style.display === 'none') {
      urnSection.style.display = '';
      requestAnimationFrame(() => { urnSection.style.opacity = '1'; });
      urnSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  } else {
    // Wrong answer: highlight the correct one and let them click it.
    btn.style.background = '#fee2e2';
    btn.style.borderColor = '#dc2626';
    const correctBtn = document.getElementById('amb-check-B');
    if (correctBtn) {
      correctBtn.style.background = '#dcfce7';
      correctBtn.style.borderColor = '#16a34a';
    }
    if (msgEl) {
      msgEl.textContent = 'Not quite — Urn B has the known composition (exactly 50 white and 50 black). Urn A is the one with the unknown mixture. Click Urn B to continue.';
      msgEl.style.display = '';
    }
  }
}

// ---- Payment computation ----
function computePayment() {
  const totalRounds = STATE.rounds.length;

  // 1) One-random-round payment for the manager task.
  //    Randomly pick one of the 4 rounds; the participant is paid the green-
  //    bonus count from that round only. Each round is equally likely (1/5).
  //    Isolation argument: every round is independently consequential.
  const paidIdx = Math.floor(Math.random() * totalRounds);
  STATE.selectedPaymentRound = paidIdx;
  STATE.outcomeEarnings = STATE.rounds[paidIdx].earnings || 0;

  // 2) Single belief payment: pool {initial μ} ∪ {θ_t, γ_t for t = 1..T},
  //    pick one uniformly, score it via BSR. One $1 lottery total.
  const allBeliefs = [{ source: 'initial' }];
  for (let i = 0; i < totalRounds; i++) {
    allBeliefs.push({ source: 'round', roundIdx: i, type: 'theta' });
    allBeliefs.push({ source: 'round', roundIdx: i, type: 'gamma' });
  }
  const selectedBelief = allBeliefs[Math.floor(Math.random() * allBeliefs.length)];

  if (selectedBelief.source === 'initial') {
    STATE.selectedBeliefIsInitial = true;
    STATE.selectedBeliefRound = null;
    STATE.selectedBeliefType = null;
    const s1scores = CONFIG.study1ScoresShared;
    const oppScore = s1scores[Math.floor(Math.random() * s1scores.length)];
    const beat = STATE.quizScoreShared > oppScore || (STATE.quizScoreShared === oppScore && Math.random() < 0.5);
    const bsr = resolveBSR(STATE.initialMu, beat, CONFIG.beliefBonusMax);
    STATE.beliefBonus_won = bsr.won;
    STATE.beliefBonus_amount = bsr.amount;
    // Resolution details for the post-hoc explanation panel on the results screen.
    STATE.beliefBonus_event = beat;
    STATE.beliefBonus_winProb = bsr.winProb;
    STATE.beliefBonus_draw = bsr.draw;
    STATE.beliefBonus_oppScore = oppScore;
  } else {
    STATE.selectedBeliefIsInitial = false;
    STATE.selectedBeliefRound = selectedBelief.roundIdx;
    STATE.selectedBeliefType = selectedBelief.type;
    const beliefRound = STATE.rounds[selectedBelief.roundIdx];
    if (selectedBelief.type === 'theta') {
      const wasPerf = (beliefRound.manager === 'alex' && STATE.perfManagerIsAlex)
                   || (beliefRound.manager === 'sam' && !STATE.perfManagerIsAlex);
      const bsr = resolveBSR(beliefRound.beliefTheta, wasPerf, CONFIG.beliefBonusMax);
      STATE.beliefBonus_won = bsr.won;
      STATE.beliefBonus_amount = bsr.amount;
      STATE.beliefBonus_event = wasPerf;
      STATE.beliefBonus_winProb = bsr.winProb;
      STATE.beliefBonus_draw = bsr.draw;
      STATE.beliefBonus_oppScore = null;
    } else {
      const s1scores = CONFIG.study1ScoresShared;
      const oppScore = s1scores[Math.floor(Math.random() * s1scores.length)];
      const beat = STATE.quizScoreShared > oppScore || (STATE.quizScoreShared === oppScore && Math.random() < 0.5);
      const bsr = resolveBSR(beliefRound.beliefGamma, beat, CONFIG.beliefBonusMax);
      STATE.beliefBonus_won = bsr.won;
      STATE.beliefBonus_amount = bsr.amount;
      STATE.beliefBonus_event = beat;
      STATE.beliefBonus_winProb = bsr.winProb;
      STATE.beliefBonus_draw = bsr.draw;
      STATE.beliefBonus_oppScore = oppScore;
    }
  }

  STATE.totalBonus = CONFIG.showUpFee + STATE.outcomeEarnings + STATE.beliefBonus_amount;

  // Visual check is the last screen before the participant sees the payoff (results).
  showScreen('visualCheck');
}

// Build the "Belief payment details" panel for the results screen. Shows the
// participant's specific belief, the realized event, the BSR-implied win
// probability, and the random draw that determined the outcome — all using
// the participant's own numbers (no abstract formula, no hypothetical example).
function beliefPaymentDetailsHTML() {
  const winProbPct  = (STATE.beliefBonus_winProb * 100).toFixed(0);
  const drawStr     = STATE.beliefBonus_draw != null ? STATE.beliefBonus_draw.toFixed(3) : '?';
  const winProbStr  = STATE.beliefBonus_winProb != null ? STATE.beliefBonus_winProb.toFixed(3) : '?';
  const won = STATE.beliefBonus_won;
  const prizeAmt = CONFIG.beliefBonusMax.toFixed(2);
  const draw = STATE.beliefBonus_draw;
  const wp = STATE.beliefBonus_winProb;
  const drawLine = (draw != null && wp != null)
    ? `The computer drew a random number between 0 and 1. Result: <strong>${drawStr}</strong> → since ${drawStr} ${won ? '&lt;' : '&gt;'} ${winProbStr}, <strong>you ${won ? 'won' : 'did not win'} the £${prizeAmt} belief payment.</strong>`
    : '';
  const footer = `<p style="margin:10px 0 0;font-style:italic;color:#475569;">This rule is designed so that stating your honest belief maximises your chance of earning the belief payment.</p>`;

  // Three cases by belief type:
  //   (a) initial μ          → performance belief about γ
  //   (b) round γ            → same shape, different intro
  //   (c) round θ            → manager-type belief (deterministic event)

  if (STATE.selectedBeliefIsInitial) {
    const mu      = STATE.initialMu;
    const oppScore = STATE.beliefBonus_oppScore;
    const myScore  = STATE.quizScoreShared;
    const beat     = STATE.beliefBonus_event;
    const p        = mu / 100;
    const formula  = beat
      ? `1 − (1 − ${p.toFixed(2)})² = ${winProbStr}`
      : `1 − ${p.toFixed(2)}² = ${winProbStr}`;
    return `
      <p style="margin:0 0 6px;"><strong>Selected belief:</strong> At the start of the study, you reported that you would beat <strong>${mu} out of 100</strong> other Prolific participants.</p>
      <p style="margin:0 0 6px;"><strong>What actually happened:</strong> We randomly drew one of the 100 reference participants. They scored <strong>${oppScore} out of 6</strong> on the shared questions. Your score was <strong>${myScore} out of 6</strong>. You <strong>${beat ? 'beat' : 'did not beat'}</strong> them.</p>
      <p style="margin:0 0 6px;">Because the event ${beat ? 'happened' : 'did not happen'}, your chance of winning the £${prizeAmt} belief payment was set to <strong>${formula}</strong> (about ${winProbPct}%).</p>
      <p style="margin:0;">${drawLine}</p>
      ${footer}`;
  }

  const r = STATE.rounds[STATE.selectedBeliefRound];

  if (STATE.selectedBeliefType === 'theta') {
    const mgr    = r.manager;
    const mgrNm  = managerName(mgr);
    const belief = r.beliefTheta;
    const wasPerf = STATE.beliefBonus_event;
    const p       = belief / 100;
    const formula = wasPerf
      ? `1 − (1 − ${p.toFixed(2)})² = ${winProbStr}`
      : `1 − ${p.toFixed(2)}² = ${winProbStr}`;
    return `
      <p style="margin:0 0 6px;"><strong>Selected belief:</strong> In Round ${r.roundNum}, you reported a <strong>${belief}% chance</strong> that ${mgrNm} was the Performance Manager.</p>
      <p style="margin:0 0 6px;"><strong>What actually happened:</strong> ${mgrNm} <strong>${wasPerf ? 'was' : 'was not'}</strong> the Performance Manager.</p>
      <p style="margin:0 0 6px;">Because the event ${wasPerf ? 'happened' : 'did not happen'}, your chance of winning the £${prizeAmt} belief payment was set to <strong>${formula}</strong> (about ${winProbPct}%).</p>
      <p style="margin:0;">${drawLine}</p>
      ${footer}`;
  }

  // performance (γ) belief in a round
  const belief   = r.beliefGamma;
  const oppScore = STATE.beliefBonus_oppScore;
  const myScore  = STATE.quizScoreShared;
  const beat     = STATE.beliefBonus_event;
  const p        = belief / 100;
  const formula  = beat
    ? `1 − (1 − ${p.toFixed(2)})² = ${winProbStr}`
    : `1 − ${p.toFixed(2)}² = ${winProbStr}`;
  return `
    <p style="margin:0 0 6px;"><strong>Selected belief:</strong> In Round ${r.roundNum}, you reported that you would beat <strong>${belief} out of 100</strong> other Prolific participants.</p>
    <p style="margin:0 0 6px;"><strong>What actually happened:</strong> We randomly drew one of the 100 reference participants. They scored <strong>${oppScore} out of 6</strong> on the shared questions. Your score was <strong>${myScore} out of 6</strong>. You <strong>${beat ? 'beat' : 'did not beat'}</strong> them.</p>
    <p style="margin:0 0 6px;">Because the event ${beat ? 'happened' : 'did not happen'}, your chance of winning the £${prizeAmt} belief payment was set to <strong>${formula}</strong> (about ${winProbPct}%).</p>
    <p style="margin:0;">${drawLine}</p>
    ${footer}`;
}

  container.innerHTML = `
    <h2 class="m-h1">Thank you</h2>

  if (CONFIG.googleSheetsURL) {
    fetch(CONFIG.googleSheetsURL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prolificPid: STATE.prolificPid,
        terminated: 1,
        terminationReason: reason,
        timestamp: new Date().toISOString(),
      }),
    }).catch(() => {});
  }
  if (!isDev) setTimeout(() => { window.location.href = CONFIG.screenOutURL; }, 1500);
}

let _dataSubmitted = false;
// Build per-check flat columns from STATE.comprehensionDetail.
// Returns an object with keys: <prefix>_attempts_total, <prefix>_failed_attempts,
// <prefix>_first_try_all_correct, <prefix>_item_<qid>_first_correct for each qid.
function extractCheckFlatFields(checkId, prefix, qids) {
  const attempts = (STATE.comprehensionDetail || []).filter(d => d.checkId === checkId);
  const out = {};
  if (attempts.length === 0) {
    out[`${prefix}_attempts_total`] = null;
    out[`${prefix}_failed_attempts`] = null;
    out[`${prefix}_first_try_all_correct`] = null;
    qids.forEach(qid => { out[`${prefix}_item_${qid}_first_correct`] = null; });
    return out;
  }
  const totalAttempts = attempts.length;
  const failedAttempts = attempts.filter(a => !a.passed).length;
  const firstAttempt = attempts[0];
  out[`${prefix}_attempts_total`] = totalAttempts;
  out[`${prefix}_failed_attempts`] = failedAttempts;
  out[`${prefix}_first_try_all_correct`] = firstAttempt.passed ? 1 : 0;
  qids.forEach(qid => {
    const resp = (firstAttempt.responses || []).find(r => r.qid === qid);
    out[`${prefix}_item_${qid}_first_correct`] = resp ? (resp.isError ? 0 : 1) : null;
  });
  return out;
}

async function submitData() {
  if (_dataSubmitted) return;
  _dataSubmitted = true;

  // ---- Per-round flat fields ----
  // STATE.rounds is 0-indexed; rounds[i] corresponds to round i+1.
  const rounds = STATE.rounds || [];
  const r = (i) => rounds[i] || {};  // safe accessor
  const getTheta = (i) => r(i).beliefTheta != null ? r(i).beliefTheta : null;
  const getGamma = (i) => r(i).beliefGamma != null ? r(i).beliefGamma : null;
  const getMgr   = (i) => r(i).manager || null;
  const getGreens = (i) => r(i).hCount != null ? r(i).hCount : null;

  // ---- Derived: switch_after_t (1 if manager changed between round t and t+1) ----
  const switchAfter = [null, null, null];  // for decisions after rounds 1, 2, 3
  for (let i = 0; i < 3; i++) {
    if (rounds[i] && rounds[i + 1]) {
      switchAfter[i] = (rounds[i].manager !== rounds[i + 1].manager) ? 1 : 0;
    }
  }

  // ---- Derived: chosen_managertype_belief_t ----
  // The θ̂ for the manager chosen at the decision following round t (i.e., the
  // manager going into round t+1). If stayed: chosen = current θ̂ at round t.
  // If switched: chosen = 100 - current θ̂ at round t (pegged sliders).
  const chosenTheta = [null, null, null];
  for (let i = 0; i < 3; i++) {
    if (rounds[i] && rounds[i + 1] && rounds[i].beliefTheta != null) {
      chosenTheta[i] = (rounds[i].manager === rounds[i + 1].manager)
        ? rounds[i].beliefTheta
        : (100 - rounds[i].beliefTheta);
    }
  }

  // ---- Derived: bias measures ----
  const initialGamma = STATE.initialMu;       // 0-100
  const gammaStar    = STATE.gammaStar;       // 0-100
  const deltaGamma0  = (initialGamma != null && gammaStar != null) ? (initialGamma - gammaStar) : null;
  const absDelta0    = deltaGamma0 != null ? Math.abs(deltaGamma0) : null;
  const oc           = deltaGamma0 != null ? (deltaGamma0 > 0 ? 1 : 0) : null;

  const biasReduction = [null, null, null, null];
  const normCorrection = [null, null, null, null];
  for (let i = 0; i < 4; i++) {
    const g_t = getGamma(i);
    if (g_t != null && gammaStar != null && absDelta0 != null) {
      const absBias_t = Math.abs(g_t - gammaStar);
      biasReduction[i] = absDelta0 - absBias_t;
      normCorrection[i] = absDelta0 > 0 ? biasReduction[i] / absDelta0 : null;
    }
  }

  // ---- Honeypot helper ----
  const honeypotEl = document.getElementById('hp_referral_code_a4b9');
  const honeypotValue = honeypotEl ? honeypotEl.value : null;
  const honeypotTripped = !!(honeypotEl && honeypotEl.value && honeypotEl.value.length > 0);

  // ---- Construct the flat payload ----
  const data = {
    // ===== Identifiers =====
    prolific_pid: STATE.prolificPid,
    study_id: STATE.studyId,
    session_id: STATE.sessionId,
    timestamp: new Date().toISOString(),

    // ===== Condition + design metadata =====
    condition: STATE.quizCondition,                                   // "easy" / "hard"
    easy: STATE.quizCondition === 'easy' ? 1 : 0,                     // 0/1 for regression
    condition_draw: STATE.quizConditionDraw,
    stratum: STATE.stratificationStratum,
    shared_score: STATE.sharedScoreAtStratification,
    stratification_server_attempts: STATE.stratificationServerAttempts,
    stratification_failures_json: STATE.stratificationFailures ? JSON.stringify(STATE.stratificationFailures) : null,
    perf_manager_is_alex: STATE.perfManagerIsAlex ? 1 : 0,
    first_round_manager: STATE.firstRoundManager,
    alex_color: STATE.alexColor,
    sam_color: STATE.samColor,
    name_order: STATE.nameOrder ? STATE.nameOrder.join(',') : null,
    takeaway_type_first: STATE.takeawayTypeFirst ? 1 : 0,
    mgr_belief_left: STATE.mgrBeliefLeft ? 1 : 0,
    coaching_theta_first: STATE.coachingThetaFirst ? 1 : 0,

    // ===== Sample question (pre-quiz practice; pre-treatment screen) =====
    sample_question_selected: STATE.sampleQuestionSelected,
    sample_question_correct: STATE.sampleQuestionCorrect === null ? null : (STATE.sampleQuestionCorrect ? 1 : 0),

    // ===== Quiz =====
    quiz_score_total: STATE.quizScore,
    quiz_score_shared: STATE.quizScoreShared,
    gamma_star: gammaStar,                          // 0-100
    random_prob_shown: STATE.randomProbShown,       // 0-100

    // ===== Beliefs (all 0-100) =====
    performance_belief_0: initialGamma,             // Phase 1 (initial μ)
    performance_belief_1: getGamma(0),              // after round 1
    performance_belief_2: getGamma(1),              // after round 2
    performance_belief_3: getGamma(2),              // after round 3
    performance_belief_4: getGamma(3),              // after round 4
    initial_confidence: STATE.initialConfidence,
    initial_kappa: STATE.initialKappa,
    initial_alpha: STATE.initialAlpha,
    initial_beta: STATE.initialBeta,

    // managertype_belief_t = θ̂ for the manager held during round t (current manager)
    // managertype_belief_0 omitted by construction (uninformed prior θ̂_0 = 50)
    managertype_belief_1: getTheta(0),

    chosen_managertype_belief_1: chosenTheta[0],
    chosen_managertype_belief_2: chosenTheta[1],

    // ===== Per-round structure =====

    // ===== Timing =====
    total_duration_ms: Date.now() - STATE.startTime,

    // ===== Raw JSON columns for forensic / detailed analysis =====
    rounds_raw_json: JSON.stringify(rounds.map(rd => ({
      roundNum: rd.roundNum, blockNum: rd.blockNum, signals: rd.signals,
      choiceBefore: rd.choiceBefore, choiceInfo: rd.choiceInfo, manager: rd.manager,
      transferred: rd.transferred, outcomes: rd.outcomes, opponentScores: rd.opponentScores,
      hCount: rd.hCount, earnings: rd.earnings,
      beliefTheta: rd.beliefTheta, beliefGamma: rd.beliefGamma,
      priorTheta: rd.priorTheta, priorGamma: rd.priorGamma,
      thetaChanged: rd.thetaChanged, gammaChanged: rd.gammaChanged,
      tsRoundStart: rd.tsRoundStart, tsFeedbackShown: rd.tsFeedbackShown,
      tsBeliefsShown: rd.tsBeliefsShown, tsBeliefsSubmit: rd.tsBeliefsSubmit,
      tsChoiceMade: rd.tsChoiceMade,
    }))),
    quiz_answers_json: JSON.stringify(STATE.quizAnswers || []),
    screen_timestamps_json: JSON.stringify(STATE.screenTimestamps || []),
    screen_durations_json: JSON.stringify(STATE.screenDurations || {}),
    paste_events_json: JSON.stringify(STATE.pasteEvents || []),
    focus_events_json: JSON.stringify(STATE.focusEvents || []),
    visual_check_trials_json: STATE.visualCheck ? JSON.stringify(STATE.visualCheck.trials) : '',
    comprehension_attempts_json: JSON.stringify(STATE.comprehensionAttempts || {}),
    comprehension_detail_json: JSON.stringify(STATE.comprehensionDetail || []),
  };

  // Store as backup
  window._experimentData = data;

  // Send to Google Sheets with retry
  if (CONFIG.googleSheetsURL) {
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        await fetch(CONFIG.googleSheetsURL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        break; // success
      } catch (e) {
        console.error(`Submit attempt ${attempt} failed:`, e);
        if (attempt < 3) await new Promise(r => setTimeout(r, 1000 * attempt));
      }
    }
  } else {
    console.log('DATA (no endpoint configured):', JSON.stringify(data, null, 2));
  }
}

// ---- Mobile detection ----
// Catches:
//   (1) Standard mobile UA strings (iPhone, old iPads, Android phones, etc.)
//   (2) iPad on iPadOS 13+ — reports a "Macintosh" UA indistinguishable from
//       a desktop Mac. Distinguish via navigator.maxTouchPoints: real Macs
//       report 0; iPads typically report 5+.
//   (3) Narrow viewports as a fallback (will also catch small split-screen
//       desktop windows — over-inclusive but on the safe side).
function isMobileDevice() {
  const ua = navigator.userAgent || '';
  if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) return true;
  if (/Macintosh/.test(ua) && navigator.maxTouchPoints && navigator.maxTouchPoints > 1) return true;
  if (window.innerWidth < 768) return true;
  return false;
}

function showMobileBlocked() {
  container.innerHTML = `
    <h2 class="m-h1">Desktop Required</h2>
    <p>This study can only be completed on a <strong>desktop or laptop computer</strong>. Mobile devices, tablets, and small screens are not supported.</p>
    <p>Please reopen this link on a desktop or laptop computer to participate.</p>
    <p>If you believe this is an error, please contact the researchers.</p>`;

  // Log rejection to Google Sheets
  if (CONFIG.googleSheetsURL) {
    fetch(CONFIG.googleSheetsURL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prolificPid: new URLSearchParams(window.location.search).get('PROLIFIC_PID') || 'unknown',
        quizCondition: 'MOBILE_BLOCKED',
        timestamp: new Date().toISOString(),
      }),
    }).catch(() => {});
  }
}

// ---- Block copy/cut/right-click + log paste + log focus changes ----
(function() {
  document.addEventListener('copy', (e) => { e.preventDefault(); STATE.copyAttempts++; });
  document.addEventListener('cut', (e) => { e.preventDefault(); STATE.copyAttempts++; });
  document.addEventListener('contextmenu', (e) => { e.preventDefault(); });

  // Paste: log everywhere, block only in <textarea> elements. (Other inputs
  // like the age number field still accept paste — participants may
  // legitimately paste digits there.)
  document.addEventListener('paste', (e) => {
    const t = e.target;
    const tag = (t && t.tagName) ? t.tagName.toUpperCase() : '';
    const id  = (t && t.id) ? t.id : '';
    const isTextarea = (tag === 'TEXTAREA');
    let length = 0;
    try {
      const data = e.clipboardData && e.clipboardData.getData('text');
      length = data ? data.length : 0;
    } catch (_) { /* clipboard API may be restricted */ }
    if (isTextarea) e.preventDefault();
    STATE.pasteEvents.push({
      ts: Date.now(),
      screen: window._currentScreen || null,
      tag, id, isTextarea, length,
      blocked: isTextarea,
    });
  });

  // Focus / visibility: log alt-tab, minimize, page hide, and refocus events.
  // Especially relevant during the timed quiz — a participant tabbing out to
  // ChatGPT mid-question leaves a trace here.
  function logFocus(eventName) {
    STATE.focusEvents.push({
      ts: Date.now(),
      screen: window._currentScreen || null,
      event: eventName,
    });
  }
  document.addEventListener('visibilitychange', () => {
    logFocus(document.hidden ? 'hidden' : 'visible');
  });
  window.addEventListener('blur',  () => logFocus('blur'));
  window.addEventListener('focus', () => logFocus('focus'));
})();

/* ==============================================================
   DEV MODE — screen jumper for development/iteration
   Usage:
     ?dev=1                          → dev menu (list of jumpable targets)
     ?dev=1&jump=<id>                → jump directly to a screen or block
     Optional params (state setup):
       ?score=N        quiz score (default 8)
       ?shared=N       shared-question score (default 4) — determines γ*
       ?easy=1|hard=1  quiz condition (default easy)
       ?start=alex|sam starting manager (default alex)
       ?perf=alex|sam  which manager is the Performance Manager (default alex)
   Disabled automatically on remote hosts so it can't be triggered by participants.
   ============================================================== */

function isDevAllowed() {
  const h = window.location.hostname;
  return h === '' || h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local');
}

function setupDevBaseState(params) {
  // Seed Math.random so every dev-mode navigation produces the same random
  // sequence. This makes the block-state screenshots (primer / bonuses / γ / θ̂)
  // share a coherent set of payments + comparison numbers.
  (function() {
    let t = parseInt(params.seed || '12345');
    Math.random = function() {
      t |= 0; t = t + 0x6D2B79F5 | 0;
      let r = Math.imul(t ^ t >>> 15, 1 | t);
      r = r + Math.imul(r ^ r >>> 7, 61 | r) ^ r;
      return ((r ^ r >>> 14) >>> 0) / 4294967296;
    };
  })();

  STATE.alexColor = '#6d28d9';
  STATE.samColor  = '#0e7490';
  document.documentElement.style.setProperty('--eval-color-alex', STATE.alexColor);
  document.documentElement.style.setProperty('--eval-color-sam', STATE.samColor);
  STATE.nameOrder   = ['alex', 'sam'];
  STATE.takeawayTypeFirst = (params.takeaway === 'perf') ? false : true;
  STATE.mgrBeliefLeft = (params.panel === 'right') ? false : true; // ?panel=right forces manager-type on right
  STATE.prolificPid = 'DEV_USER';
  STATE.sessionId   = 'dev_' + Date.now();
  STATE.studyId     = 'dev';

  STATE.quizCondition   = (params.hard === '1') ? 'hard' : 'easy';
  STATE.quizScoreShared = parseInt(params.shared || '4');
  STATE.quizScore       = parseInt(params.score  || '8');
  STATE.gammaStar       = computeGammaStar(STATE.quizScoreShared);
  STATE.randomProbShown = Math.round(STATE.gammaStar);

  // Default prior belief so screens past the elicitation have something to read.
  STATE.initialMu         = 50;
  STATE.initialConfidence = 3;
  STATE.initialKappa      = 18;
  STATE.initialAlpha      = 9;
  STATE.initialBeta       = 9;

  STATE.perfManagerIsAlex = (params.perf === 'sam') ? false : true;

  const start = (params.start === 'sam' || params.start === 'alex') ? params.start : 'alex';
  STATE.currentManager    = start;
  STATE.firstRoundManager = start;
}

function synthesizeRoundsForDev(upToBlockCount) {
  STATE.rounds = [];
  for (let i = 0; i < upToBlockCount; i++) {
    const outcomes = [];
    const opponents = [];
    for (let k = 0; k < 10; k++) {
      outcomes.push(Math.random() < (STATE.gammaStar / 100) ? 'H' : 'L');
      opponents.push(2);
    }
    const hCount = outcomes.filter(o => o === 'H').length;
    STATE.rounds.push({
      roundNum: i + 1, blockNum: i + 1,
      manager: STATE.currentManager,
      transferred: i === 0 ? null : false,
      outcomes, opponentScores: opponents,
      hCount, earnings: hCount * CONFIG.payPerH,
      beliefTheta: 40, beliefGamma: 50,
    });
  }
}

const DEV_TARGETS = [
  { id: 'welcome',              group: 'Phase 1',       label: 'Welcome' },
  { id: 'consent',              group: 'Phase 1',       label: 'Consent' },
  { id: 'screening',            group: 'Phase 1',       label: 'Screening (attention check 1 + demographics)' },
  { id: 'quizInstructions',     group: 'Phase 1',       label: 'Quiz instructions (+ attention check 2)' },
  { id: 'quizComprehension',    group: 'Phase 1',       label: 'Quiz comprehension check' },
  { id: 'sampleQuestion',       group: 'Phase 1',       label: 'Sample question' },
  { id: 'predictionIntro',      group: 'Phase 1',       label: 'Predictions & prizes (BSR explainer)' },
  { id: 'scoreAndBelief',       group: 'Phase 1',       label: 'Score + prior belief (μ + confidence + bin table)' },
  { id: 'mTask',                group: 'Phase 2 intro', label: 'Task structure (managers, rounds, switches)' },
  { id: 'mTaskCheck',           group: 'Phase 2 intro', label: 'Comprehension check — task structure' },
  { id: 'mTypes',               group: 'Phase 2 intro', label: 'Manager types (Performance vs Random mechanisms)' },
  { id: 'mTypesCheck',          group: 'Phase 2 intro', label: 'Comprehension check — manager types' },
  { id: 'free',                 group: 'Phase 2 task',  label: 'Free selection (before batch 1)',   custom: true },
  { id: 'block1',               group: 'Phase 2 task',  label: 'Batch 1 signals (50)',              custom: true },
  { id: 'switch1',              group: 'Phase 2 task',  label: 'First stay/switch decision',        custom: true },
  { id: 'block2',               group: 'Phase 2 task',  label: 'Batch 2 (after stay/switch 1)',     custom: true },
  { id: 'switch2',              group: 'Phase 2 task',  label: 'Second stay/switch decision',       custom: true },
  { id: 'block3',               group: 'Phase 2 task',  label: 'Batch 3 (after stay/switch 2)',     custom: true },
  { id: 'switch3',              group: 'Phase 2 task',  label: 'Third stay/switch decision',        custom: true },
  { id: 'block4',               group: 'Phase 2 task',  label: 'Batch 4 (after stay/switch 3)',     custom: true },
  { id: 'roundsComplete',       group: 'Phase 3',       label: 'Rounds complete' },
  { id: 'riskPreferences',      group: 'Phase 3',       label: 'Risk preferences (GPS)' },
  { id: 'patiencePreferences',  group: 'Phase 3',       label: 'Patience preferences (GPS)' },
  { id: 'ambiguityPreferences', group: 'Phase 3',       label: 'Ambiguity preferences' },
  { id: 'demographics',         group: 'Phase 3',       label: 'Demographics' },

  { id: 'revealOption',         group: 'Phase 3',       label: 'Opt-in: learn quiz performance + manager identities' },
  { id: 'revealInfo',           group: 'Phase 3',       label: 'Reveal screen (if opted in)' },
  { id: 'results',              group: 'Phase 3',       label: 'Results / payment screen' },
];

function devJump(targetId, params) {
  setupDevBaseState(params);
  const t = DEV_TARGETS.find(x => x.id === targetId);
  if (!t) { showDevMenu('Unknown target: ' + targetId); return; }
  if (!t.custom) {
    showScreen(targetId);
    addDevBanner(t);
    return;
  }
  if (targetId === 'free') {
    showFreeSelectionScreen();
  } else if (/^block\d$/.test(targetId)) {
    const n = parseInt(targetId.slice(5));
    synthesizeRoundsForDev(n - 1);
    STATE.currentBlockIdx = n - 1;
    renderBlock(null);
  } else if (targetId === 'switch1' || targetId === 'switch2' || targetId === 'switch3') {
    const blockIdx = (targetId === 'switch1') ? 1 : (targetId === 'switch2') ? 2 : 3;
    synthesizeRoundsForDev(blockIdx);
    STATE.currentBlockIdx = blockIdx;
    showSwitchChoiceScreen();
  }
  addDevBanner(t);
}

function showDevMenu(error) {
  const groups = {};
  DEV_TARGETS.forEach(t => { (groups[t.group] = groups[t.group] || []).push(t); });
  const base = window.location.pathname + '?dev=1&jump=';
  const groupHTML = Object.keys(groups).map(g => `
    <h3 style="font-size:0.9rem;color:#475569;margin:18px 0 8px;">${g}</h3>
    <ul style="list-style:none;padding:0;margin:0;">
      ${groups[g].map(t => `<li style="margin:4px 0;"><a href="${base}${t.id}" style="color:#2563eb;text-decoration:none;font-size:0.95rem;">${t.label}</a> <code style="color:#94a3b8;font-size:0.8rem;margin-left:6px;">${t.id}</code></li>`).join('')}
    </ul>`).join('');
  container.innerHTML = `
    <div class="screen-header"><h2>Dev menu — screen jumper</h2></div>
    ${error ? `<p style="color:#dc2626;">${error}</p>` : ''}
    <p style="font-size:0.93rem;color:#475569;">Click a target to jump there with default state. Add URL params <code>?easy=1</code>/<code>?hard=1</code>, <code>?score=N</code>, <code>?shared=N</code>, <code>?start=alex|sam</code>, <code>?perf=alex|sam</code> to tweak the underlying state.</p>
    ${groupHTML}
    <p style="margin-top:24px;font-size:0.85rem;color:#94a3b8;">Dev mode is active because <code>?dev=1</code> is set. It is disabled automatically on remote hosts.</p>`;
  addDevBanner(null);
}

function addDevBanner(target) {
  let banner = document.getElementById('dev-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'dev-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fef3c7;border-bottom:1px solid #fbbf24;color:#78350f;font-size:0.78rem;padding:4px 12px;z-index:9999;display:flex;justify-content:space-between;align-items:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;';
    document.body.appendChild(banner);
    document.body.style.paddingTop = '24px';
  }
  const label = target ? `→ ${target.id} (${target.label})` : '→ dev menu';
  const base  = window.location.pathname + '?dev=1';
  banner.innerHTML = `
    <span><strong>DEV</strong> &nbsp; ${label}</span>
    <span>
      <a href="${base}" style="color:#78350f;text-decoration:underline;margin-right:14px;">menu</a>
      <a href="${window.location.pathname}" style="color:#78350f;text-decoration:underline;">exit dev</a>
    </span>`;
}

function init() {
  getUrlParams();
  STATE.startTime = Date.now();

  const params = Object.fromEntries(new URLSearchParams(window.location.search));
  if (params.dev === '1' && isDevAllowed()) {
    if (params.jump) devJump(params.jump, params);
    else             showDevMenu();
    return;
  }

  // Randomize Alex/Sam colors (purple vs teal) and name order, once per session
  const palette = ['#6d28d9', '#0e7490']; // purple, teal — both far from H-green and L-red
  if (Math.random() < 0.5) {
    STATE.alexColor = palette[0]; STATE.samColor = palette[1];
  } else {
    STATE.alexColor = palette[1]; STATE.samColor = palette[0];
  }
  document.documentElement.style.setProperty('--eval-color-alex', STATE.alexColor);
  document.documentElement.style.setProperty('--eval-color-sam', STATE.samColor);
  STATE.nameOrder = Math.random() < 0.5 ? ['alex', 'sam'] : ['sam', 'alex'];
  STATE.takeawayTypeFirst = Math.random() < 0.5; // counterbalance Round-1 takeaway order
  STATE.mgrBeliefLeft = Math.random() < 0.5;     // treatment: manager-type belief left vs right panel
  STATE.coachingThetaFirst = Math.random() < 0.5; // treatment: coaching prior-θ recall before (true) vs after (false) the conditionals
  if (isMobileDevice()) {
    showMobileBlocked();
    return;
  }
  showScreen('welcome');
}

// Start
init();
